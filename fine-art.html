<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fine Art — Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0b1c26;
  --text: rgba(228,218,200,0.88);
  --text-dim: rgba(200,185,165,0.55);
  --text-bright: rgba(235,225,208,0.95);
  --accent: rgba(190,155,90,0.80);
  --accent-dim: rgba(190,155,90,0.35);
  --glass-bg: rgba(200,195,222,0.06);
  --glass-bg-hover: rgba(200,195,222,0.12);
  --glass-border: rgba(255,255,255,0.10);
  --glass-border-hover: rgba(255,255,255,0.18);
  --blur: blur(32px) saturate(1.3);
  --ease: cubic-bezier(0.25, 0.46, 0.45, 0.94);
  --radius: 14px;
}

html {
  background: var(--bg);
}

body {
  min-height: 100vh;
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  background-color: var(--bg);
  background-image:
    linear-gradient(rgba(31,15,56,0.52), rgba(20,10,35,0.48)),
    url('A Images/Studio Painting Fine Art.webp');
  background-size: cover;
  background-position: center top;
  background-repeat: no-repeat;
  background-attachment: fixed;
  overflow-x: hidden;
}

/* ── PAGE TRANSITIONS ── */
#page-exit {
  position: fixed; inset: 0;
  background: var(--bg);
  opacity: 0; pointer-events: none;
  transition: opacity 0.28s ease-in;
  z-index: 9999;
}
#page-exit.active { opacity: 1; }

#page-enter {
  position: fixed; inset: 0;
  background: var(--bg);
  opacity: 1; pointer-events: none;
  transition: opacity 0.6s var(--ease);
  z-index: 9998;
}
#page-enter.gone { opacity: 0; }

/* ── WORDMARK ── */
.wordmark {
  position: fixed;
  bottom: 24px; left: 21px;
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  font-weight: 300;
  letter-spacing: 0.2em;
  color: rgba(210,195,172,0.18);
  pointer-events: none;
  z-index: 10;
}

/* ── BACK BUTTON ── */
.back-link {
  position: fixed;
  top: 28px; left: 32px;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(14px) saturate(1.2);
  -webkit-backdrop-filter: blur(14px) saturate(1.2);
  border: 1px solid var(--glass-border);
  border-radius: 100px;
  padding: 9px 18px 9px 14px;
  cursor: pointer;
  color: rgba(200,185,165,0.75);
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  transition: background 0.25s ease, color 0.25s ease, border-color 0.25s ease;
  z-index: 100;
  text-decoration: none;
}
.back-link:hover {
  background: rgba(255,255,255,0.11);
  color: rgba(200,185,165,1);
  border-color: var(--glass-border-hover);
}
.back-arrow {
  display: inline-block;
  width: 16px; height: 1px;
  background: currentColor;
  position: relative; flex-shrink: 0;
}
.back-arrow::before {
  content: '';
  position: absolute;
  left: 0; top: -3px;
  width: 6px; height: 6px;
  border-left: 1px solid currentColor;
  border-bottom: 1px solid currentColor;
  transform: rotate(45deg);
}

/* ── HERO ── */
.hero {
  position: relative;
  width: 100%;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.hero-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
  background-size: 80px 80px;
  pointer-events: none;
  mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 20%, transparent 100%);
  -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 20%, transparent 100%);
}

.hero-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(52px, 8vw, 96px);
  font-weight: 300;
  font-style: italic;
  color: var(--text-bright);
  letter-spacing: 0.06em;
  text-align: center;
  line-height: 1;
  text-shadow: 0 2px 20px rgba(0,0,0,0.5);
  opacity: 0;
  transform: translateY(24px);
  transition: opacity 0.8s var(--ease) 0.3s, transform 0.8s var(--ease) 0.3s;
}
body.visible .hero-title {
  opacity: 1;
  transform: translateY(0);
}

.hero-statement {
  font-family: 'DM Sans', sans-serif;
  font-size: clamp(13px, 1.4vw, 16px);
  font-weight: 300;
  font-style: normal;
  color: rgba(228,218,200,0.62);
  margin-top: 28px;
  text-align: center;
  max-width: 520px;
  line-height: 1.8;
  letter-spacing: 0.02em;
  text-shadow: 0 1px 12px rgba(0,0,0,0.4);
  opacity: 0;
  transform: translateY(16px);
  transition: opacity 0.8s var(--ease) 0.55s, transform 0.8s var(--ease) 0.55s;
}
body.visible .hero-statement {
  opacity: 1;
  transform: translateY(0);
}

.hero-count {
  font-family: 'DM Sans', sans-serif;
  font-size: 9px;
  font-weight: 400;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--accent-dim);
  margin-top: 10px;
  opacity: 0;
  transition: opacity 0.7s var(--ease) 0.7s;
}
body.visible .hero-count { opacity: 1; }

.scroll-hint {
  position: absolute;
  bottom: 36px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  opacity: 0;
  transition: opacity 0.6s var(--ease) 1s;
}
body.visible .scroll-hint { opacity: 1; }

.scroll-hint span {
  font-size: 8px;
  font-weight: 400;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--text-dim);
}
.scroll-chevron-wrap {
  animation: scrollBounce 2s ease-in-out infinite;
}
.scroll-chevron {
  width: 14px;
  height: 14px;
  border-right: 1px solid var(--accent-dim);
  border-bottom: 1px solid var(--accent-dim);
  transform: rotate(45deg);
}

@keyframes scrollBounce {
  0%, 100% { opacity: 0.3; transform: translateY(0); }
  50% { opacity: 1; transform: translateY(6px); }
}
@keyframes glitter {
  0%, 100% { opacity: 0; transform: translate(-50%,-50%) scale(0); }
  10%       { opacity: 0; transform: translate(-50%,-50%) scale(0); }
  35%       { opacity: 1; transform: translate(-50%,-50%) scale(1.2); }
  55%       { opacity: 1; transform: translate(-50%,-50%) scale(1); }
  80%       { opacity: 0; transform: translate(-50%,-50%) scale(0.2); }
}

@keyframes scrollPulse {
  0%, 100% { opacity: 0.3; transform: scaleY(0.6); }
  50% { opacity: 1; transform: scaleY(1); }
}

/* ── MOTES ── */
.mote {
  position: fixed;
  width: 2px; height: 2px;
  border-radius: 50%;
  background: rgba(190,155,90,0.35);
  pointer-events: none;
  z-index: 1;
  animation: moteFloat 12s ease-in-out infinite;
}
@keyframes moteFloat {
  0%, 100% { transform: translate(0, 0); opacity: 0.2; }
  25% { transform: translate(12px, -18px); opacity: 0.5; }
  50% { transform: translate(-8px, -30px); opacity: 0.3; }
  75% { transform: translate(16px, -14px); opacity: 0.55; }
}

/* ── FILTER BAR ── */
.filter-bar {
  position: sticky;
  top: 0;
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px 32px;
  background: rgba(8,16,22,0.97);
  border-bottom: 1px solid rgba(255,255,255,0.04);
  flex-wrap: wrap;
}

.filter-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: 100px;
  padding: 8px 18px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 9px;
  font-weight: 400;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-dim);
  transition: all 0.3s ease;
  user-select: none;
}
.filter-chip:hover {
  background: var(--glass-bg-hover);
  color: var(--text);
  border-color: var(--glass-border-hover);
}
.filter-chip.active {
  background: rgba(190,155,90,0.12);
  border-color: rgba(190,155,90,0.30);
  color: var(--accent);
}
.filter-chip .chip-count {
  font-size: 8px;
  font-weight: 300;
  opacity: 0.6;
}

/* ── GALLERY SCRIM — removed, handled by gallery-wrap ── */

/* ── GALLERY ── */
.gallery-wrap {
  background: #0a1620;
  max-width: 1200px;
  margin: 0 auto;
  padding: 48px 32px 80px;
  position: relative;
  z-index: 2;
}

.gallery {
  display: flex;
  gap: 24px;
  align-items: flex-start;
}
.gallery-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 24px;
  min-width: 0;
}

.gallery-card {
  position: relative;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.06);
  cursor: pointer;
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 0.45s var(--ease), transform 0.45s var(--ease);
}
.gallery-card.revealed {
  opacity: 1;
  transform: translateY(0);
}
.gallery-card.filtered-out {
  display: none;
}

.card-image {
  width: 100%;
  display: block;
  position: relative;
  overflow: hidden;
}
.card-image img {
  width: 100%;
  display: block;
}
.card-placeholder {
  width: 100%;
  position: relative;
}

/* ── HOVER OVERLAY (matches graphic-design page) ── */
.card-hover-overlay {
  position: absolute;
  inset: 0;
  background: rgba(11,28,38,0.0);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 16px;
  transition: background 0.35s var(--ease);
  pointer-events: none;
}
.gallery-card.hovered .card-hover-overlay {
  background: rgba(11,28,38,0.65);
}
.hover-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  font-weight: 400;
  font-style: italic;
  color: rgba(228,218,200,0.95);
  text-align: center;
  letter-spacing: 0.02em;
  line-height: 1.3;
  opacity: 0;
  transform: translateY(6px);
  transition: opacity 0.3s ease 0.05s, transform 0.3s ease 0.05s;
}
.hover-detail {
  font-family: 'DM Sans', sans-serif;
  font-size: 8px;
  font-weight: 400;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: rgba(190,155,90,0.70);
  text-align: center;
  opacity: 0;
  transform: translateY(4px);
  transition: opacity 0.3s ease 0.1s, transform 0.3s ease 0.1s;
}
.gallery-card.hovered .hover-title,
.gallery-card.hovered .hover-detail {
  opacity: 1;
  transform: translateY(0);
}

/* ── GLITTER DOTS (spawned on hover via JS) ── */
.glitter-dot {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  animation: glitter var(--dur) ease-in-out var(--delay) infinite;
}

/* ── CARD LABEL — removed, info only on hover ── */

/* ── TIMELINE ── */
.timeline-section {
  max-width: 1200px;
  margin: 0 auto;
  padding: 40px 32px 100px;
  background: #0a1620;
  position: relative;
  z-index: 2;
}
.timeline-label {
  font-family: 'DM Sans', sans-serif;
  font-size: 8px;
  font-weight: 400;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--text-dim);
  text-align: center;
  margin-bottom: 28px;
}
.timeline {
  position: relative;
  height: 60px;
  display: flex;
  align-items: center;
}
.timeline-track {
  position: absolute;
  left: 0; right: 0;
  height: 1px;
  background: rgba(180,160,130,0.12);
}
.timeline-years {
  position: relative;
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.timeline-year {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  z-index: 2;
}
.timeline-year-label {
  font-family: 'DM Sans', sans-serif;
  font-size: 9px;
  font-weight: 400;
  letter-spacing: 0.1em;
  color: var(--text-dim);
  transition: color 0.3s ease;
}
.timeline-year:hover .timeline-year-label,
.timeline-year.active .timeline-year-label {
  color: var(--accent);
}
.timeline-dots {
  display: flex;
  gap: 3px;
  height: 12px;
  align-items: center;
}
.timeline-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  transition: transform 0.3s ease;
}
.timeline-dot.oil { background: rgba(120,140,180,0.7); }
.timeline-dot.ink { background: rgba(160,130,190,0.7); }
.timeline-dot.gold { background: rgba(190,155,90,0.7); }
.timeline-dot.pencil { background: rgba(180,170,155,0.7); }

/* ── TIMELINE POPUP ── */
.timeline-popup {
  position: absolute;
  bottom: 70px;
  left: 50%;
  transform: translateX(-50%) translateY(8px);
  display: flex;
  gap: 10px;
  padding: 14px;
  background: rgba(15,25,35,0.92);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  box-shadow: 0 12px 48px rgba(0,0,0,0.5);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease, transform 0.3s var(--ease);
  white-space: nowrap;
}
.timeline-year.active .timeline-popup {
  opacity: 1;
  pointer-events: all;
  transform: translateX(-50%) translateY(0);
}
.timeline-popup::after {
  content: '';
  position: absolute;
  bottom: -6px;
  left: 50%;
  transform: translateX(-50%) rotate(45deg);
  width: 10px; height: 10px;
  background: rgba(15,25,35,0.92);
  border-right: 1px solid var(--glass-border);
  border-bottom: 1px solid var(--glass-border);
}
.timeline-thumb {
  width: 56px;
  height: 72px;
  border-radius: 6px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.08);
  cursor: pointer;
  position: relative;
  transition: border-color 0.25s ease, transform 0.25s ease;
  flex-shrink: 0;
}
.timeline-thumb:hover {
  border-color: var(--accent);
  transform: scale(1.08);
}
.timeline-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.timeline-thumb-placeholder {
  width: 100%;
  height: 100%;
}
.timeline-thumb-title {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 3px 4px;
  background: rgba(0,0,0,0.6);
  font-family: 'DM Sans', sans-serif;
  font-size: 6px;
  font-weight: 400;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(228,218,200,0.85);
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ── LIGHTBOX ── */
.lightbox {
  position: fixed;
  inset: 0;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s var(--ease);
}
.lightbox.open {
  opacity: 1;
  pointer-events: all;
}
.lightbox-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(6,12,18,0.88);
  backdrop-filter: blur(24px) saturate(0.8);
  -webkit-backdrop-filter: blur(24px) saturate(0.8);
}
.lightbox-content {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  max-width: 90vw;
  max-height: 90vh;
  transform: scale(0.3);
  opacity: 0;
  transition: transform 0.55s cubic-bezier(0.16, 1, 0.3, 1),
              opacity 0.4s ease;
}
.lightbox.open .lightbox-content {
  transform: scale(1) translate(0, 0) !important;
  opacity: 1 !important;
}
.lightbox.closing .lightbox-content {
  transform: scale(0.85) !important;
  opacity: 0 !important;
  transition: transform 0.3s cubic-bezier(0.55, 0, 1, 0.45),
              opacity 0.25s ease;
}

.lightbox-image-wrap {
  position: relative;
  max-height: 70vh;
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid var(--glass-border);
  box-shadow: 0 24px 80px rgba(0,0,0,0.5);
  transform-origin: center center;
}
.lightbox-image-wrap img {
  max-height: 70vh;
  max-width: 80vw;
  display: block;
  object-fit: contain;
}
.lightbox-placeholder {
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius);
}

.lightbox-info {
  margin-top: 24px;
  text-align: center;
  padding: 20px 32px;
  background: var(--glass-bg);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  min-width: 320px;
  /* animation handled by .lightbox.open .lightbox-info rule */
}
.lightbox-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px;
  font-weight: 400;
  font-style: italic;
  color: var(--text-bright);
  line-height: 1.2;
  margin-bottom: 12px;
}
.lightbox-details {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}
.lightbox-detail {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  font-weight: 300;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-dim);
}
.lightbox-detail .val {
  color: var(--accent);
}

.lightbox-close {
  position: fixed;
  top: 28px; right: 32px;
  width: 40px; height: 40px;
  border: 1px solid var(--glass-border);
  border-radius: 50%;
  background: var(--glass-bg);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.25s ease, border-color 0.25s ease;
  z-index: 1001;
}
.lightbox-close:hover {
  background: var(--glass-bg-hover);
  border-color: var(--glass-border-hover);
}
.lightbox-close::before,
.lightbox-close::after {
  content: '';
  position: absolute;
  width: 14px; height: 1px;
  background: var(--text-dim);
}
.lightbox-close::before { transform: rotate(45deg); }
.lightbox-close::after { transform: rotate(-45deg); }

.lightbox-nav {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  width: 44px; height: 44px;
  border: 1px solid var(--glass-border);
  border-radius: 50%;
  background: var(--glass-bg);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.25s ease, border-color 0.25s ease;
  z-index: 1001;
}
.lightbox-nav:hover {
  background: var(--glass-bg-hover);
  border-color: var(--glass-border-hover);
}
.lightbox-prev { left: 24px; }
.lightbox-next { right: 24px; }
.lightbox-nav::before {
  content: '';
  width: 10px; height: 10px;
  border-top: 1px solid var(--text-dim);
  border-right: 1px solid var(--text-dim);
}
.lightbox-prev::before { transform: rotate(-135deg) translateX(-1px); }
.lightbox-next::before { transform: rotate(45deg) translateX(-1px); }

.lightbox-counter {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'DM Sans', sans-serif;
  font-size: 9px;
  font-weight: 400;
  letter-spacing: 0.2em;
  color: var(--text-dim);
  z-index: 1001;
}

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  .gallery { gap: 18px; }
  .gallery-col { gap: 18px; }
  .gallery-wrap { padding: 36px 20px 60px; }
  .lightbox-nav { display: none; }
}
@media (max-width: 580px) {
  .gallery-wrap { padding: 28px 16px 48px; }
  .filter-bar { gap: 8px; padding: 14px 16px; }
  .filter-chip { padding: 6px 14px; font-size: 8px; }
  .lightbox-info { min-width: unset; padding: 16px 20px; }
  .lightbox-title { font-size: 22px; }
  .timeline-section { display: none; }
}
</style>
</head>
<body>

<!-- Page transitions -->
<div id="page-exit"></div>
<div id="page-enter"></div>

<!-- Back button -->

/* ═══════════════════════════════════════════
   SEEDED PLACEHOLDER GRADIENTS
   ═══════════════════════════════════════════ */
function seedHue(title) {
  let h = 0;
  for (let i = 0; i < title.length; i++) h = ((h << 5) - h + title.charCodeAt(i)) | 0;
  return Math.abs(h) % 360;
}

function placeholderGradient(art) {
  const hue = seedHue(art.title);
  const catTint = { oil: 220, ink: 270, gold: 42, pencil: 35 }[art.cat] || 200;
  const mix = (hue + catTint) / 2;
  return `linear-gradient(
    ${135 + (hue % 90)}deg,
    hsl(${mix}, 25%, 22%) 0%,
    hsl(${hue}, 30%, 28%) 40%,
    hsl(${catTint}, 20%, 18%) 100%
  )`;
}

/* ═══════════════════════════════════════════
   BUILD GALLERY
   ═══════════════════════════════════════════ */
const gallery = document.getElementById('gallery');

/* Create 3 column containers */
const NUM_COLS = 3;
const cols = [];
const colHeights = [0, 0, 0];
for (let c = 0; c < NUM_COLS; c++) {
  const col = document.createElement('div');
  col.className = 'gallery-col';
  gallery.appendChild(col);
  cols.push(col);
}

artworks.forEach((art, i) => {
  const ratio = art.h / art.w;
  const card = document.createElement('div');
  card.className = 'gallery-card';
  card.dataset.cat = art.cat;
  card.dataset.index = i;

  const imageHTML = art.img
    ? `<img src="${encodeURI(art.img)}" alt="${art.title}" style="width:100%;display:block;">`
    : `<div class="card-placeholder" style="padding-bottom:${ratio * 100}%;background:${placeholderGradient(art)};"></div>`;

  card.innerHTML = `
    <div class="card-image">
      ${imageHTML}
    </div>
    <div class="card-hover-overlay">
      <div class="hover-title">${art.title}</div>
      <div class="hover-detail">${art.w}&times;${art.h}&Prime; &middot; ${art.medium} &middot; ${art.year}</div>
    </div>
  `;

  card.addEventListener('click', () => openLightbox(i, card));

  /* Place in shortest column (masonry distribution) */
  let shortest = 0;
  for (let c = 1; c < NUM_COLS; c++) {
    if (colHeights[c] < colHeights[shortest]) shortest = c;
  }
  cols[shortest].appendChild(card);
  colHeights[shortest] += ratio + 0.15; /* 0.15 accounts for gap */
});

/* ═══════════════════════════════════════════
   RESPONSIVE REDISTRIBUTION
   ═══════════════════════════════════════════ */
let currentColCount = NUM_COLS;

function getColCount() {
  if (window.innerWidth <= 580) return 1;
  if (window.innerWidth <= 900) return 2;
  return 3;
}

function redistributeCards() {
  const needed = getColCount();
  if (needed === currentColCount) return;
  currentColCount = needed;

  /* Collect all cards in DOM order (preserving data-index) */
  const allCards = Array.from(gallery.querySelectorAll('.gallery-card'));

  /* Ensure correct number of column divs */
  while (cols.length < needed) {
    const col = document.createElement('div');
    col.className = 'gallery-col';
    gallery.appendChild(col);
    cols.push(col);
  }
  /* Hide extra columns, show needed ones */
  cols.forEach((col, i) => {
    col.style.display = i < needed ? '' : 'none';
  });

  /* Sort by original index to maintain order */
  allCards.sort((a, b) => parseInt(a.dataset.index) - parseInt(b.dataset.index));

  /* Redistribute using shortest-column algorithm */
  const heights = new Array(needed).fill(0);
  allCards.forEach(card => {
    const art = artworks[parseInt(card.dataset.index)];
    const ratio = art.h / art.w;
    let shortest = 0;
    for (let c = 1; c < needed; c++) {
      if (heights[c] < heights[shortest]) shortest = c;
    }
    cols[shortest].appendChild(card);
    heights[shortest] += ratio + 0.15;
  });
}

window.addEventListener('resize', redistributeCards);
redistributeCards(); /* initial check */

/* ═══════════════════════════════════════════
   COUNTS
   ═══════════════════════════════════════════ */
const counts = { all: artworks.length, oil: 0, ink: 0, gold: 0, pencil: 0 };
artworks.forEach(a => counts[a.cat]++);
document.getElementById('countAll').textContent = counts.all;
document.getElementById('countOil').textContent = counts.oil;
document.getElementById('countInk').textContent = counts.ink;
document.getElementById('countGold').textContent = counts.gold;
document.getElementById('countPencil').textContent = counts.pencil;
document.getElementById('heroCount').textContent = `${artworks.length} works \u00b7 2012\u20132024`;

/* ═══════════════════════════════════════════
   FILTERS
   ═══════════════════════════════════════════ */
let activeFilter = 'all';
const chips = document.querySelectorAll('.filter-chip');
const cards = document.querySelectorAll('.gallery-card');

chips.forEach(chip => {
  chip.addEventListener('click', () => {
    const filter = chip.dataset.filter;
    if (filter === activeFilter) return;
    activeFilter = filter;
    chips.forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    applyFilter();
  });
});

function applyFilter() {
  let delay = 0;
  document.querySelectorAll('.gallery-card').forEach(card => {
    const match = activeFilter === 'all' || card.dataset.cat === activeFilter;
    card.classList.toggle('filtered-out', !match);
    if (match && !card.classList.contains('revealed')) {
      setTimeout(() => card.classList.add('revealed'), delay);
      delay += 60;
    }
  });
}

/* ═══════════════════════════════════════════
   SCROLL REVEAL
   ═══════════════════════════════════════════ */
let revealDelay = 0;
const revealObserver = new IntersectionObserver((entries) => {
  entries.forEach((entry) => {
    if (entry.isIntersecting) {
      const d = revealDelay;
      revealDelay += 80;
      setTimeout(() => {
        entry.target.classList.add('revealed');
      }, d);
      revealObserver.unobserve(entry.target);
      // Reset stagger after batch settles
      clearTimeout(window._revealReset);
      window._revealReset = setTimeout(() => { revealDelay = 0; }, 300);
    }
  });
}, { threshold: 0.05, rootMargin: '0px 0px 120px 0px' });

document.querySelectorAll('.gallery-card').forEach(card => revealObserver.observe(card));

/* ═══════════════════════════════════════════
   LIGHTBOX
   ═══════════════════════════════════════════ */
const lightbox = document.getElementById('lightbox');
const lightboxContent = document.getElementById('lightboxContent');
const lightboxCounter = document.getElementById('lightboxCounter');
let currentIndex = -1;
let visibleIndices = [];

function getVisibleIndices() {
  return artworks.map((a, i) => i).filter(i => {
    return activeFilter === 'all' || artworks[i].cat === activeFilter;
  });
}

function openLightbox(index, cardEl) {
  visibleIndices = getVisibleIndices();
  currentIndex = index;
  renderLightbox();

  // Set origin point from clicked card
  if (cardEl) {
    const rect = cardEl.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dx = cx - window.innerWidth / 2;
    const dy = cy - window.innerHeight / 2;
    // Start small at the card's position
    lightboxContent.style.cssText = `transform: scale(0.2) translate(${dx * 4}px, ${dy * 4}px); opacity: 0;`;
    void lightboxContent.offsetHeight; // force reflow
  }

  lightbox.classList.add('open');
  document.body.style.overflow = 'hidden';

  // Clear inline styles so CSS .open rules take over
  requestAnimationFrame(() => {
    lightboxContent.style.cssText = '';
  });
}

function closeLightbox() {
  lightbox.classList.add('closing');
  setTimeout(() => {
    lightbox.classList.remove('open', 'closing');
    document.body.style.overflow = '';
    currentIndex = -1;
  }, 300);
}

function renderLightbox() {
  const art = artworks[currentIndex];
  const ratio = art.h / art.w;
  const maxW = Math.min(window.innerWidth * 0.8, 700);
  const maxH = window.innerHeight * 0.65;
  let dispW = maxW;
  let dispH = dispW * ratio;
  if (dispH > maxH) {
    dispH = maxH;
    dispW = dispH / ratio;
  }

  const lbImageHTML = art.img
    ? `<img src="${encodeURI(art.img)}" alt="${art.title}" style="max-height:70vh;max-width:80vw;display:block;object-fit:contain;">`
    : `<div class="lightbox-placeholder" style="width:${dispW}px;height:${dispH}px;background:${placeholderGradient(art)};"></div>`;

  lightboxContent.innerHTML = `
    <div class="lightbox-image-wrap">
      ${lbImageHTML}
    </div>
    <div class="lightbox-info">
      <div class="lightbox-title">${art.title}</div>
      <div class="lightbox-details">
        <span class="lightbox-detail"><span class="val">${art.medium}</span></span>
        <span class="lightbox-detail">${art.w}&times;${art.h}&Prime;</span>
        <span class="lightbox-detail"><span class="val">${art.year}</span></span>
      </div>
    </div>
  `;

  const pos = visibleIndices.indexOf(currentIndex) + 1;
  lightboxCounter.textContent = `${pos} / ${visibleIndices.length}`;
}

function lightboxNav(dir) {
  const pos = visibleIndices.indexOf(currentIndex);
  const next = (pos + dir + visibleIndices.length) % visibleIndices.length;
  currentIndex = visibleIndices[next];
  renderLightbox();
}

document.getElementById('lightboxBackdrop').addEventListener('click', closeLightbox);
document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
document.getElementById('lightboxPrev').addEventListener('click', () => lightboxNav(-1));
document.getElementById('lightboxNext').addEventListener('click', () => lightboxNav(1));

document.addEventListener('keydown', e => {
  if (currentIndex === -1) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') lightboxNav(-1);
  if (e.key === 'ArrowRight') lightboxNav(1);
});

/* ═══════════════════════════════════════════
   TIMELINE
   ═══════════════════════════════════════════ */
const timelineYears = document.getElementById('timelineYears');
const yearMap = {};
artworks.forEach((art, i) => {
  if (!yearMap[art.year]) yearMap[art.year] = [];
  yearMap[art.year].push({ ...art, index: i });
});

const years = Object.keys(yearMap).map(Number).sort();
let activeYear = null;

years.forEach(year => {
  const el = document.createElement('div');
  el.className = 'timeline-year';

  // Build thumbnail popup
  const thumbs = yearMap[year].map(a => {
    const imgHTML = a.img
      ? `<img src="${encodeURI(a.img)}" alt="${a.title}" loading="lazy">`
      : `<div class="timeline-thumb-placeholder" style="background:${placeholderGradient(a)};"></div>`;
    return `<div class="timeline-thumb" data-index="${a.index}">
      ${imgHTML}
      <div class="timeline-thumb-title">${a.title}</div>
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="timeline-popup">${thumbs}</div>
    <div class="timeline-dots">
      ${yearMap[year].map(a => `<div class="timeline-dot ${a.cat}"></div>`).join('')}
    </div>
    <div class="timeline-year-label">${year}</div>
  `;

  el.addEventListener('click', (e) => {
    // If clicking a thumb, open that artwork in lightbox
    const thumb = e.target.closest('.timeline-thumb');
    if (thumb) {
      const idx = parseInt(thumb.dataset.index);
      openLightbox(idx, null);
      return;
    }
    // Toggle year popup
    if (activeYear === el) {
      el.classList.remove('active');
      activeYear = null;
    } else {
      if (activeYear) activeYear.classList.remove('active');
      el.classList.add('active');
      activeYear = el;
    }
  });

  timelineYears.appendChild(el);
});

// Close popup when clicking outside
document.addEventListener('click', (e) => {
  if (activeYear && !e.target.closest('.timeline-year')) {
    activeYear.classList.remove('active');
    activeYear = null;
  }
});

/* ═══════════════════════════════════════════
   MOTES
   ═══════════════════════════════════════════ */
const moteContainer = document.getElementById('motes');
for (let i = 0; i < 18; i++) {
  const m = document.createElement('div');
  m.className = 'mote';
  m.style.left = Math.random() * 100 + 'vw';
  m.style.top = Math.random() * 100 + 'vh';
  m.style.animationDelay = (Math.random() * 12).toFixed(1) + 's';
  m.style.animationDuration = (10 + Math.random() * 8).toFixed(1) + 's';
  moteContainer.appendChild(m);
}

/* ═══════════════════════════════════════════
   GLITTER ON HOVER (matches graphic-design page)
   ═══════════════════════════════════════════ */
function spawnGlitter(e) {
  const el = e.currentTarget;
  for (let i = 0; i < 14; i++) {
    const dot = document.createElement('div');
    dot.className = 'glitter-dot';
    const size = 0.5 + Math.random() * 1.5;
    const bright = Math.random() > 0.4;
    dot.style.cssText = `
      width:${size}px;height:${size}px;
      left:${Math.random()*100}%;top:${Math.random()*100}%;
      background:${bright ? 'rgba(255,245,220,1)' : 'rgba(220,210,195,0.8)'};
      ${bright ? 'filter:drop-shadow(0 0 3px rgba(255,245,220,0.9)) drop-shadow(0 0 6px rgba(245,225,180,0.55))' : ''};
      --dur:${2+Math.random()*3}s;--delay:${Math.random()*1.5}s;
    `;
    el.appendChild(dot);
  }
}
function clearGlitter(e) {
  e.currentTarget.querySelectorAll('.glitter-dot').forEach(d => d.remove());
}
document.querySelectorAll('.gallery-card').forEach(card => {
  card.addEventListener('mouseenter', (e) => {
    card.classList.add('hovered');
    spawnGlitter(e);
  });
  card.addEventListener('mouseleave', (e) => {
    card.classList.remove('hovered');
    clearGlitter(e);
  });
});

/* ═══════════════════════════════════════════
   PAGE INIT
   ═══════════════════════════════════════════ */
function navigateTo(url) {
  const exit = document.getElementById('page-exit');
  exit.classList.add('active');
  setTimeout(() => { window.location.href = url; }, 300);
}

window.addEventListener('DOMContentLoaded', () => {
  requestAnimationFrame(() => {
    document.body.classList.add('visible');
    document.getElementById('page-enter').classList.add('gone');
  });
});
</script>
