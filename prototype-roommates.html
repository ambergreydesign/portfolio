<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoomMates · Compatibility Matcher</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #080604;
  --bg-card:  #110e0b;
  --coral:    #de9a7a;
  --coral-g:  rgba(222,154,122,0.55);
  --sage:     #8bc89a;
  --sage-g:   rgba(139,200,154,0.55);
  --ice:      #f0e4d8;
  --text:     #dde6f4;
  --muted:    rgba(200,185,165,0.5);
  --border:   rgba(222,154,122,0.12);
  --amber:    #d4a576;
}

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
}
html { overflow: hidden; }
body { overflow: hidden; }
body.scrollable { overflow-y: auto; }
body.scrollable #app { height: auto; min-height: 100vh; }

/* ── BACK NAV ── */
.nav-back {
  position: fixed; top: 24px; left: 28px; z-index: 100;
  display: inline-flex; align-items: center; gap: 9px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 100px; padding: 8px 16px 8px 12px;
  cursor: pointer; color: rgba(200,185,165,0.65);
  font-size: 9px; font-weight: 400; letter-spacing: 0.22em; text-transform: uppercase;
  transition: background 0.2s, color 0.2s;
}
.nav-back:hover { background: rgba(255,255,255,0.09); color: rgba(200,185,165,0.95); }
.nav-back-arrow { display: inline-block; width: 14px; height: 1px; background: currentColor; position: relative; flex-shrink: 0; }
.nav-back-arrow::before { content: ''; position: absolute; left: 0; top: -3px; width: 5px; height: 5px; border-left: 1px solid currentColor; border-bottom: 1px solid currentColor; transform: rotate(45deg); }

/* ── EMBEDDED MODE ── */
.embedded .nav-back { display: none; }
.embedded .wordmark { display: none; }

.wordmark { position: fixed; bottom: 20px; left: 21px; font-size: 12px; font-weight: 300; letter-spacing: 0.2em; color: rgba(210,195,172,0.1); pointer-events: none; z-index: 10; }

/* ── MAIN LAYOUT ── */
#app {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  position: relative; overflow: visible;
}

/* Background glow */
#app::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 50% 40% at 30% 55%, rgba(222,154,122,0.05) 0%, transparent 70%),
    radial-gradient(ellipse 50% 40% at 70% 45%, rgba(139,200,154,0.04) 0%, transparent 70%);
}

/* ── PROGRESS BAR ── */
#progress-wrap {
  position: fixed; top: 0; left: 0; right: 0; height: 3px;
  background: rgba(255,255,255,0.04); z-index: 50;
}
#progress-bar {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, var(--coral), var(--sage));
  transition: width 0.45s cubic-bezier(0.22,1,0.36,1);
  border-radius: 0 2px 2px 0;
  box-shadow: 0 0 12px rgba(222,154,122,0.3);
}

/* ── CARD CONTAINER ── */
#card {
  position: relative; z-index: 1;
  width: 520px; max-width: 92vw;
  background: linear-gradient(160deg, #14100e, #0c0908);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 48px 44px;
  box-shadow: 0 24px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(222,154,122,0.05);
  transition: transform 0.35s ease, opacity 0.35s ease;
}
#card.exit { transform: translateY(-20px) scale(0.97); opacity: 0; }
#card.enter { transform: translateY(20px) scale(0.97); opacity: 0; }

/* ── STEP LABEL ── */
.step-label {
  font-size: 8px; font-weight: 600; letter-spacing: 0.3em; text-transform: uppercase;
  color: var(--coral); opacity: 0.7; margin-bottom: 24px;
}

/* ── QUESTION ── */
.question {
  font-family: 'Cormorant Garamond', serif;
  font-size: 30px; font-weight: 600; line-height: 1.2;
  color: var(--ice); margin-bottom: 36px;
}

/* ── OPTIONS ── */
.options { display: flex; flex-direction: column; gap: 10px; }

.opt-btn {
  display: flex; align-items: center; gap: 14px;
  width: 100%; padding: 16px 20px;
  background: rgba(222,154,122,0.04);
  border: 1px solid rgba(222,154,122,0.1);
  border-radius: 14px;
  cursor: pointer;
  color: rgba(200,185,165,0.65);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 400; letter-spacing: 0.02em;
  transition: all 0.22s ease;
  text-align: left;
}
.opt-btn:hover {
  background: rgba(222,154,122,0.12);
  border-color: rgba(222,154,122,0.35);
  color: var(--ice);
  transform: translateX(4px);
}
.opt-btn.selected {
  background: rgba(222,154,122,0.18);
  border-color: rgba(222,154,122,0.55);
  color: #fff;
  box-shadow: 0 0 18px rgba(222,154,122,0.15);
}
.opt-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: rgba(222,154,122,0.08);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
  transition: background 0.22s ease;
}
.opt-btn:hover .opt-icon,
.opt-btn.selected .opt-icon { background: rgba(222,154,122,0.2); }
.opt-text { display: flex; flex-direction: column; gap: 2px; }
.opt-title { font-weight: 500; }
.opt-sub { font-size: 11px; color: rgba(200,185,165,0.35); font-weight: 400; }
.opt-btn:hover .opt-sub, .opt-btn.selected .opt-sub { color: rgba(200,185,165,0.55); }

/* ── RESULTS VIEW ── */
#results {
  position: relative; z-index: 1;
  width: 680px; max-width: 92vw;
  padding: 80px 0 60px;
  opacity: 0; transform: translateY(30px);
  transition: opacity 0.6s ease, transform 0.6s ease;
  pointer-events: none;
  display: none;
}
#results.visible { display: block; opacity: 1; transform: translateY(0); pointer-events: auto; }

.results-label {
  font-size: 8px; font-weight: 600; letter-spacing: 0.3em; text-transform: uppercase;
  color: var(--coral); opacity: 0.7; margin-bottom: 12px; text-align: center;
}

.results-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 42px; font-weight: 600; line-height: 1.15;
  color: var(--ice); text-align: center; margin-bottom: 44px;
}

/* Score ring */
.score-wrap {
  display: flex; justify-content: center; margin-bottom: 44px;
}
.score-ring {
  width: 160px; height: 160px; position: relative;
}
.score-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.score-track { fill: none; stroke: rgba(222,154,122,0.08); stroke-width: 6; }
.score-fill {
  fill: none; stroke: url(#scoreGrad); stroke-width: 6;
  stroke-linecap: round;
  stroke-dasharray: 440; stroke-dashoffset: 440;
  transition: stroke-dashoffset 1.8s cubic-bezier(0.22,1,0.36,1);
}
.score-number {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.score-val {
  font-family: 'DM Sans', sans-serif;
  font-size: 48px; font-weight: 700; color: var(--ice);
  letter-spacing: -0.02em; line-height: 1;
}
.score-pct { font-size: 20px; font-weight: 300; color: var(--coral); }
.score-tag {
  font-size: 10px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--muted); margin-top: 4px;
}

/* Match profile */
.match-profile {
  background: linear-gradient(160deg, #14100e, #0c0908);
  border: 1px solid var(--border);
  border-radius: 20px; padding: 32px 36px;
  margin-bottom: 20px;
}
.match-header {
  display: flex; align-items: center; gap: 18px;
  margin-bottom: 24px;
  padding-bottom: 20px;
  border-bottom: 1px solid rgba(222,154,122,0.08);
}
.match-avatar {
  width: 56px; height: 56px; border-radius: 16px;
  background: linear-gradient(135deg, rgba(222,154,122,0.2), rgba(139,200,154,0.15));
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
}
.match-info { flex: 1; }
.match-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px; font-weight: 600; color: var(--ice); line-height: 1.2;
}
.match-bio { font-size: 12px; color: var(--muted); margin-top: 4px; }
.match-badge {
  padding: 5px 12px; border-radius: 100px;
  background: rgba(139,200,154,0.1); border: 1px solid rgba(139,200,154,0.25);
  font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--sage);
}

/* Breakdown bars */
.breakdown { display: flex; flex-direction: column; gap: 16px; }
.bd-row { display: flex; align-items: center; gap: 16px; }
.bd-label {
  width: 110px; flex-shrink: 0;
  font-size: 11px; font-weight: 500; letter-spacing: 0.06em;
  color: rgba(200,185,165,0.55); text-align: right;
}
.bd-track {
  flex: 1; height: 8px;
  background: rgba(222,154,122,0.06);
  border-radius: 100px; overflow: hidden;
  position: relative;
}
.bd-fill {
  height: 100%; border-radius: 100px;
  background: linear-gradient(90deg, var(--coral), var(--sage));
  width: 0%;
  transition: width 1.2s cubic-bezier(0.22,1,0.36,1);
}
.bd-val {
  width: 36px; flex-shrink: 0;
  font-size: 12px; font-weight: 600; color: var(--ice);
  letter-spacing: 0.02em;
}

/* Restart */
.restart-wrap { display: flex; justify-content: center; margin-top: 36px; }
#btn-restart {
  background: rgba(222,154,122,0.08);
  border: 1px solid rgba(222,154,122,0.2);
  border-radius: 100px;
  padding: 12px 36px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--coral);
  transition: all 0.25s ease;
}
#btn-restart:hover {
  background: rgba(222,154,122,0.16);
  border-color: rgba(222,154,122,0.45);
  transform: translateY(-2px);
  box-shadow: 0 4px 20px rgba(222,154,122,0.15);
}

/* ── LOADING STATE ── */
#loading {
  position: absolute; inset: 0; z-index: 20;
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  background: var(--bg);
}
#loading.visible { display: flex; }
.loading-ring {
  width: 48px; height: 48px;
  border: 2px solid rgba(222,154,122,0.1);
  border-top-color: var(--coral);
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
  margin-bottom: 20px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
  font-size: 11px; font-weight: 400; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--muted);
}

/* ── INTRO VIEW ── */
#intro {
  position: relative; z-index: 1;
  text-align: center; max-width: 480px;
}
#intro.hidden { display: none; }
.intro-label {
  font-size: 8px; font-weight: 600; letter-spacing: 0.3em; text-transform: uppercase;
  color: var(--coral); opacity: 0.7; margin-bottom: 16px;
}
.intro-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 48px; font-weight: 600; line-height: 1.1;
  color: var(--ice); margin-bottom: 16px;
}
.intro-sub {
  font-size: 15px; font-weight: 300; line-height: 1.7; letter-spacing: 0.02em;
  color: var(--muted); margin-bottom: 40px; max-width: 380px; margin-left: auto; margin-right: auto;
}
#btn-start {
  display: inline-flex; align-items: center; gap: 10px;
  background: rgba(222,154,122,0.1);
  border: 1px solid rgba(222,154,122,0.28);
  border-radius: 100px;
  padding: 14px 40px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--coral);
  transition: all 0.25s ease;
}
#btn-start:hover {
  background: rgba(222,154,122,0.2);
  border-color: rgba(222,154,122,0.55);
  transform: translateY(-2px);
  box-shadow: 0 6px 28px rgba(222,154,122,0.2);
  color: #fff;
}

@media (max-width: 560px) {
  #card { padding: 32px 24px; }
  .question { font-size: 24px; }
  .intro-title { font-size: 36px; }
  .results-title { font-size: 32px; }
  .match-profile { padding: 24px 20px; }
  .bd-label { width: 80px; font-size: 10px; }
  .score-ring { width: 130px; height: 130px; }
  .score-val { font-size: 40px; }
}
</style>
</head>
<body>

<button class="nav-back" onclick="window.location.href='case-study-roommates.html'">
  <span class="nav-back-arrow"></span>
  Case Study
</button>
<div class="wordmark">Amber Grey</div>

<div id="progress-wrap"><div id="progress-bar"></div></div>

<div id="app">

  <!-- INTRO -->
  <div id="intro">
    <div class="intro-label">Interactive Prototype</div>
    <div class="intro-title">Find Your Match</div>
    <p class="intro-sub">Answer 6 quick lifestyle questions and we'll match you with a compatible roommate profile — based on real research insights.</p>
    <button id="btn-start">Begin Matching</button>
  </div>

  <!-- QUIZ CARD -->
  <div id="card" style="display:none;"></div>

  <!-- LOADING -->
  <div id="loading">
    <div class="loading-ring"></div>
    <div class="loading-text">Finding your match</div>
  </div>

  <!-- RESULTS -->
  <div id="results">
    <svg width="0" height="0" style="position:absolute;">
      <defs>
        <linearGradient id="scoreGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#de9a7a"/>
          <stop offset="100%" stop-color="#8bc89a"/>
        </linearGradient>
      </defs>
    </svg>

    <div class="results-label">Your Match</div>
    <div class="results-title" id="results-title">Here's who we found</div>

    <div class="score-wrap">
      <div class="score-ring">
        <svg viewBox="0 0 160 160">
          <circle class="score-track" cx="80" cy="80" r="70"/>
          <circle class="score-fill" id="score-circle" cx="80" cy="80" r="70"/>
        </svg>
        <div class="score-number">
          <div class="score-val"><span id="score-num">0</span><span class="score-pct">%</span></div>
          <div class="score-tag">Compatible</div>
        </div>
      </div>
    </div>

    <div class="match-profile">
      <div class="match-header">
        <div class="match-avatar" id="match-avatar"></div>
        <div class="match-info">
          <div class="match-name" id="match-name"></div>
          <div class="match-bio" id="match-bio"></div>
        </div>
        <div class="match-badge" id="match-badge">Strong Match</div>
      </div>
      <div class="breakdown" id="breakdown"></div>
    </div>

    <div class="restart-wrap">
      <button id="btn-restart">Try Again</button>
    </div>
  </div>

</div>

<script>
'use strict';

// ── EMBEDDED DETECTION ──
if (window.self !== window.top) document.body.classList.add('embedded');

// ── QUESTIONS ──
const QUESTIONS = [
  {
    label: 'Lifestyle',
    q: 'What does your ideal evening look like?',
    opts: [
      { icon: '🌙', title: 'Quiet night in', sub: 'Reading, cooking, early bedtime', tags: { schedule: 'early', social: 'low', noise: 'quiet' } },
      { icon: '🎧', title: 'Chill at home', sub: 'Music, shows, relaxed but up late', tags: { schedule: 'late', social: 'low', noise: 'moderate' } },
      { icon: '🍷', title: 'Friends over sometimes', sub: 'Social a few nights a week', tags: { schedule: 'flexible', social: 'moderate', noise: 'moderate' } },
      { icon: '🎉', title: 'Go out or host often', sub: 'Love having people around', tags: { schedule: 'late', social: 'high', noise: 'loud' } }
    ]
  },
  {
    label: 'Cleanliness',
    q: 'How would you describe your cleaning standards?',
    opts: [
      { icon: '✨', title: 'Spotless', sub: 'Everything has a place, cleaned daily', tags: { clean: 'high' } },
      { icon: '🧹', title: 'Tidy', sub: 'Clean up regularly, some clutter is fine', tags: { clean: 'moderate-high' } },
      { icon: '🏠', title: 'Relaxed', sub: 'Clean when it matters, lived-in vibe', tags: { clean: 'moderate' } },
      { icon: '🌀', title: 'Creative chaos', sub: 'Organized mess, deep clean weekly', tags: { clean: 'low' } }
    ]
  },
  {
    label: 'Boundaries',
    q: 'How do you feel about sharing things?',
    opts: [
      { icon: '🔒', title: 'Mine is mine', sub: 'I keep my stuff separate', tags: { sharing: 'none' } },
      { icon: '🤝', title: 'Ask first', sub: 'Happy to share, but check with me', tags: { sharing: 'moderate' } },
      { icon: '🍳', title: 'What\'s mine is ours', sub: 'Communal kitchen, shared supplies', tags: { sharing: 'high' } },
      { icon: '💫', title: 'All in', sub: 'Full commune vibes, share everything', tags: { sharing: 'full' } }
    ]
  },
  {
    label: 'Communication',
    q: 'When something bothers you, how do you handle it?',
    opts: [
      { icon: '💬', title: 'Direct conversation', sub: 'I\'ll bring it up right away', tags: { comms: 'direct' } },
      { icon: '📝', title: 'Thoughtful message', sub: 'I prefer to write it out first', tags: { comms: 'written' } },
      { icon: '⏳', title: 'Wait and see', sub: 'Give it time, see if it resolves', tags: { comms: 'passive' } },
      { icon: '🤷', title: 'Go with the flow', sub: 'Most things don\'t bother me much', tags: { comms: 'flexible' } }
    ]
  },
  {
    label: 'Space',
    q: 'How much alone time do you need?',
    opts: [
      { icon: '🏔️', title: 'A lot', sub: 'I recharge completely alone', tags: { space: 'high' } },
      { icon: '🌿', title: 'Moderate', sub: 'Some alone time daily is ideal', tags: { space: 'moderate' } },
      { icon: '☕', title: 'A little', sub: 'Alone sometimes, but I like company', tags: { space: 'low' } },
      { icon: '🌻', title: 'Almost none', sub: 'I love always having someone around', tags: { space: 'none' } }
    ]
  },
  {
    label: 'Values',
    q: 'What matters most in a roommate?',
    opts: [
      { icon: '🫶', title: 'Respect & consideration', sub: 'Awareness of shared space boundaries', tags: { value: 'respect' } },
      { icon: '🧼', title: 'Cleanliness & order', sub: 'Keeping the space livable', tags: { value: 'clean' } },
      { icon: '💭', title: 'Communication', sub: 'Being open and honest about issues', tags: { value: 'comms' } },
      { icon: '😊', title: 'Friendship', sub: 'Someone I actually enjoy being around', tags: { value: 'friendship' } }
    ]
  }
];

// ── ROOMMATE PROFILES ──
const PROFILES = [
  { name: 'Jordan Chen', age: 27, icon: '🎨', bio: 'Graphic designer, tea collector, weekend hiker', style: 'Creative but tidy. Likes a clean kitchen and quiet mornings.' },
  { name: 'Maya Torres', age: 24, icon: '📚', bio: 'Grad student, plant parent, early riser', style: 'Structured routine. Values open communication and shared meals.' },
  { name: 'Sam Okafor', age: 30, icon: '🎸', bio: 'Music teacher, home cook, board game night host', style: 'Social but respectful. Always asks before having people over.' },
  { name: 'Alex Rivera', age: 26, icon: '💻', bio: 'Remote developer, podcast listener, night owl', style: 'Keeps to themselves weekdays, social on weekends. Clean but relaxed.' },
  { name: 'Priya Sharma', age: 28, icon: '🧘', bio: 'Yoga instructor, meal prepper, minimalist', style: 'Calm presence. Spotless shared spaces, easygoing about everything else.' },
  { name: 'Kai Nakamura', age: 25, icon: '🏃', bio: 'Personal trainer, early bird, smoothie maker', style: 'High energy but low drama. Communicates directly and values routine.' }
];

const CATEGORIES = ['Schedule', 'Cleanliness', 'Social Style', 'Communication', 'Boundaries'];

// ── STATE ──
let step = 0;
let answers = [];

// ── ELEMENTS ──
const intro    = document.getElementById('intro');
const card     = document.getElementById('card');
const bar      = document.getElementById('progress-bar');
const loading  = document.getElementById('loading');
const results  = document.getElementById('results');

// ── START ──
document.getElementById('btn-start').addEventListener('click', () => {
  intro.classList.add('hidden');
  card.style.display = '';
  step = 0;
  answers = [];
  renderQuestion();
});

document.getElementById('btn-restart').addEventListener('click', () => {
  document.body.classList.remove('scrollable');
  window.scrollTo(0, 0);
  results.classList.remove('visible');
  intro.classList.remove('hidden');
  bar.style.width = '0%';
  step = 0;
  answers = [];
});

// ── RENDER QUESTION ──
function renderQuestion() {
  const q = QUESTIONS[step];
  bar.style.width = `${((step) / QUESTIONS.length) * 100}%`;

  // Reset all transition classes before setting new content
  card.classList.remove('exit');
  card.classList.add('enter');

  card.innerHTML = `
    <div class="step-label">Question ${step + 1} of ${QUESTIONS.length} · ${q.label}</div>
    <div class="question">${q.q}</div>
    <div class="options">
      ${q.opts.map((o, i) => `
        <button class="opt-btn" data-idx="${i}">
          <div class="opt-icon">${o.icon}</div>
          <div class="opt-text">
            <div class="opt-title">${o.title}</div>
            <div class="opt-sub">${o.sub}</div>
          </div>
        </button>
      `).join('')}
    </div>
  `;

  // Force reflow then remove enter class to trigger animation
  void card.offsetHeight;
  card.classList.remove('enter');

  card.querySelectorAll('.opt-btn').forEach(btn => {
    btn.addEventListener('click', () => selectOption(btn));
  });
}

function selectOption(btn) {
  const idx = parseInt(btn.dataset.idx);
  answers.push(idx);

  // Visual feedback
  btn.classList.add('selected');
  card.querySelectorAll('.opt-btn').forEach(b => {
    b.style.pointerEvents = 'none';
  });

  setTimeout(() => {
    step++;
    if (step < QUESTIONS.length) {
      card.classList.add('exit');
      setTimeout(() => {
        renderQuestion();
      }, 300);
    } else {
      card.classList.add('exit');
      bar.style.width = '100%';
      setTimeout(() => {
        card.style.display = 'none';
        showLoading();
      }, 300);
    }
  }, 400);
}

// ── LOADING ──
function showLoading() {
  loading.classList.add('visible');
  setTimeout(() => {
    loading.classList.remove('visible');
    showResults();
  }, 2200);
}

// ── RESULTS ──
function showResults() {
  // Generate a "compatibility score" based on answers
  // This is a fun simulation, not real matching logic
  const baseScore = 62;
  const variance = answers.reduce((sum, a) => sum + (a * 3), 0);
  const score = Math.min(96, Math.max(68, baseScore + (variance % 30)));

  // Pick a profile pseudo-randomly based on answers
  const profileIdx = (answers[0] + answers[2] + answers[4]) % PROFILES.length;
  const profile = PROFILES[profileIdx];

  // Generate category scores
  const catScores = CATEGORIES.map((cat, i) => {
    const base = 55 + (answers[i % answers.length] * 8);
    const jitter = ((answers[(i + 1) % answers.length] * 7 + i * 13) % 20) - 5;
    return { cat, score: Math.min(98, Math.max(52, base + jitter)) };
  });
  catScores.sort((a, b) => b.score - a.score);

  // Badge
  const badge = score >= 85 ? 'Excellent Match' : score >= 75 ? 'Strong Match' : 'Good Match';

  // Populate
  document.getElementById('match-avatar').textContent = profile.icon;
  document.getElementById('match-name').textContent = `${profile.name}, ${profile.age}`;
  document.getElementById('match-bio').textContent = profile.bio;
  document.getElementById('match-badge').textContent = badge;
  document.getElementById('results-title').textContent = profile.style;

  const bd = document.getElementById('breakdown');
  bd.innerHTML = catScores.map(c => `
    <div class="bd-row">
      <div class="bd-label">${c.cat}</div>
      <div class="bd-track"><div class="bd-fill" data-w="${c.score}"></div></div>
      <div class="bd-val">${c.score}%</div>
    </div>
  `).join('');

  document.body.classList.add('scrollable');
  window.scrollTo(0, 0);
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      results.classList.add('visible');

      // Animate score ring
      const circumference = 2 * Math.PI * 70; // ~440
      const offset = circumference - (score / 100) * circumference;
      document.getElementById('score-circle').style.strokeDashoffset = offset;

      // Animate number
      animateNumber('score-num', 0, score, 1400);

      // Animate bars with stagger
      setTimeout(() => {
        bd.querySelectorAll('.bd-fill').forEach((fill, i) => {
          setTimeout(() => {
            fill.style.width = fill.dataset.w + '%';
          }, i * 120);
        });
      }, 600);
    });
  });
}

function animateNumber(id, from, to, duration) {
  const el = document.getElementById(id);
  const start = performance.now();
  function tick(now) {
    const t = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - t, 3);
    el.textContent = Math.round(from + (to - from) * ease);
    if (t < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}
</script>
