<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contradiction Mode — The Scale</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #0e1a12;
  font-family: 'DM Sans', sans-serif;
  user-select: none;
  -webkit-user-select: none;
}

/* ── AMBIENT ── */
.orb { position: fixed; border-radius: 50%; filter: blur(130px); pointer-events: none; opacity: 0.1; }
.orb-1 { width: 500px; height: 500px; background: #cc6cf0; top: -150px; left: -80px; }
.orb-2 { width: 400px; height: 400px; background: #e2aa62; bottom: -100px; right: -40px; }

/* ── STAGES ── */
.stage {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.8s cubic-bezier(0.25,0.46,0.45,0.94);
}
.stage.active { opacity: 1; pointer-events: auto; }

/* ── HEADER ── */
.header {
  position: fixed; top: 0; left: 0; right: 0;
  display: flex; justify-content: space-between; align-items: center;
  padding: 28px 36px; z-index: 50;
}
.header-title { font-size: 9px; font-weight: 500; letter-spacing: 0.32em; text-transform: uppercase; color: rgba(204,108,240,0.5); }
.header-counter { font-size: 10px; font-weight: 400; letter-spacing: 0.18em; color: rgba(200,185,165,0.25); }

/* ── PROGRESS ── */
.progress { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; z-index: 50; }
.pdot { width: 5px; height: 5px; border-radius: 50%; background: rgba(200,185,165,0.15); transition: background 0.5s ease, transform 0.3s ease; }
.pdot.active { background: rgba(204,108,240,0.55); transform: scale(1.4); }
.pdot.done-good { background: rgba(104,176,120,0.6); }
.pdot.done-bad { background: rgba(226,170,98,0.5); }

/* ══ INTRO ══ */
.intro { text-align: center; max-width: 560px; padding: 0 40px; }
.intro-label { font-size: 9px; font-weight: 500; letter-spacing: 0.35em; text-transform: uppercase; color: rgba(204,108,240,0.6); margin-bottom: 28px; }
.intro-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(36px,5vw,60px); font-weight: 600; line-height: 1.1; color: #eac6ce; margin-bottom: 20px; }
.intro-sub { font-family: 'Cormorant Garamond', serif; font-size: clamp(16px,2vw,22px); font-weight: 400; font-style: italic; line-height: 1.5; color: rgba(200,185,165,0.5); margin-bottom: 48px; }
.intro-cta {
  display: inline-flex; align-items: center; gap: 12px;
  background: none; border: 1px solid rgba(204,108,240,0.25); border-radius: 100px;
  padding: 12px 28px; color: rgba(204,108,240,0.7);
  font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 500;
  letter-spacing: 0.25em; text-transform: uppercase; cursor: pointer;
  transition: background 0.3s, color 0.3s, border-color 0.3s;
}
.intro-cta:hover { background: rgba(204,108,240,0.08); color: rgba(204,108,240,0.95); border-color: rgba(204,108,240,0.45); }

/* ══ ARENA ══ */
.arena { width: 100%; height: 100%; position: relative; }

/* ── STATUS ── */
.status-msg {
  position: absolute; top: 18%; left: 50%; transform: translateX(-50%);
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 400;
  letter-spacing: 0.06em; color: rgba(200,185,165,0.3);
  transition: color 0.5s ease; pointer-events: none; white-space: nowrap;
}
.status-msg.balanced {
  font-family: 'Cormorant Garamond', serif; font-size: 22px;
  font-style: italic; font-weight: 400; letter-spacing: 0;
  color: rgba(104,176,120,0.7);
}

/* ── SCALE (SVG-based) ── */
.scale-svg {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 500px; height: 300px;
  overflow: visible;
}

/* ── DROP ZONES (visible targets) ── */
.drop-target {
  position: absolute;
  top: 50%; transform: translateY(-20%);
  width: 180px; height: 160px;
  border: 2px dashed rgba(200,185,165,0.08);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.25s ease, background 0.25s ease;
}
.drop-target-left  { left: calc(50% - 260px); }
.drop-target-right { right: calc(50% - 260px); }
.drop-target.hover {
  border-color: rgba(204,108,240,0.35);
  background: rgba(204,108,240,0.04);
}
.drop-target.filled {
  border-color: rgba(200,185,165,0.12);
  background: rgba(255,255,255,0.02);
}
.drop-target-label {
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px; font-weight: 400; font-style: italic;
  line-height: 1.4; color: rgba(234,198,206,0.8);
  text-align: center; padding: 16px;
  opacity: 0; transition: opacity 0.4s ease;
}
.drop-target.filled .drop-target-label { opacity: 1; }

/* ── CARD DOCK ── */
.dock {
  position: absolute;
  bottom: 72px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 20px; z-index: 30;
}
.card {
  width: 220px; padding: 22px 20px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  cursor: grab; touch-action: none;
  transition: transform 0.3s ease, box-shadow 0.3s ease, opacity 0.4s ease;
}
.card:hover {
  border-color: rgba(204,108,240,0.25);
  box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  transform: translateY(-4px);
}
.card.dragging {
  cursor: grabbing;
  box-shadow: 0 8px 40px rgba(204,108,240,0.2);
  z-index: 100; opacity: 0.9;
  transition: box-shadow 0.1s ease;
}
.card.placed { opacity: 0; pointer-events: none; transform: scale(0.8); }
.card-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px; font-weight: 400; font-style: italic;
  line-height: 1.4; color: #f2ead8; text-align: center;
}
.card-hint {
  display: block; margin-top: 10px;
  font-family: 'DM Sans', sans-serif; font-size: 8px; font-weight: 400;
  letter-spacing: 0.2em; text-transform: uppercase;
  color: rgba(200,185,165,0.25); text-align: center;
}

/* ══ REVEAL ══ */
.reveal-overlay {
  position: fixed; inset: 0;
  background: rgba(14,26,18,0.95);
  display: flex; align-items: center; justify-content: center;
  text-align: center; opacity: 0; pointer-events: none;
  transition: opacity 0.8s ease; z-index: 200; padding: 40px;
}
.reveal-overlay.active { opacity: 1; pointer-events: auto; }
.reveal-inner { max-width: 520px; }
.reveal-label { font-size: 9px; font-weight: 500; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(226,170,98,0.6); margin-bottom: 28px; }
.reveal-text { font-family: 'Cormorant Garamond', serif; font-size: clamp(24px,3.5vw,40px); font-weight: 400; font-style: italic; line-height: 1.4; color: #eac6ce; margin-bottom: 36px; }
.reveal-sub { font-size: 12px; line-height: 1.7; color: rgba(200,185,165,0.35); margin-bottom: 32px; }
.reveal-continue { display: inline-block; font-size: 9px; font-weight: 400; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(200,185,165,0.3); cursor: pointer; transition: color 0.25s ease; }
.reveal-continue:hover { color: rgba(200,185,165,0.6); }

/* ══ CLOSING ══ */
.closing { text-align: center; max-width: 560px; padding: 0 40px; }
.closing-text { font-family: 'Cormorant Garamond', serif; font-size: clamp(26px,3.5vw,42px); font-weight: 600; line-height: 1.25; color: #eac6ce; margin-bottom: 40px; }
.closing-stats { display: flex; justify-content: center; gap: 56px; margin-bottom: 48px; }
.cstat { text-align: center; }
.cstat-num { font-family: 'Cormorant Garamond', serif; font-size: 38px; font-weight: 300; margin-bottom: 6px; }
.cstat-num.good { color: rgba(104,176,120,0.7); }
.cstat-num.broke { color: rgba(226,170,98,0.7); }
.cstat-label { font-size: 9px; font-weight: 400; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(200,185,165,0.3); }
.closing-restart {
  display: inline-flex; align-items: center; gap: 10px;
  background: none; border: 1px solid rgba(200,185,165,0.12); border-radius: 100px;
  padding: 10px 24px; color: rgba(200,185,165,0.35);
  font-family: 'DM Sans', sans-serif; font-size: 9px; font-weight: 400;
  letter-spacing: 0.22em; text-transform: uppercase; cursor: pointer;
  transition: color 0.25s ease, border-color 0.25s ease;
}
.closing-restart:hover { color: rgba(200,185,165,0.65); border-color: rgba(200,185,165,0.25); }

/* ── MOBILE ── */
@media (max-width: 680px) {
  .scale-svg { width: 360px; height: 220px; }
  .drop-target { width: 150px; height: 130px; }
  .drop-target-left  { left: calc(50% - 200px); }
  .drop-target-right { right: calc(50% - 200px); }
  .dock { gap: 12px; bottom: 52px; }
  .card { width: 170px; padding: 16px 14px; }
  .card-text { font-size: 14px; }
  .header { padding: 20px 20px; }
}
@media (max-width: 420px) {
  .dock { flex-direction: column; align-items: center; bottom: 36px; }
  .card { width: 200px; }
  .scale-svg { width: 280px; height: 180px; }
  .drop-target-left  { left: calc(50% - 165px); }
  .drop-target-right { right: calc(50% - 165px); }
}
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="header">
  <span class="header-title">Contradiction Mode</span>
  <span class="header-counter" id="counter"></span>
</div>
<div class="progress" id="progress"></div>

<!-- ══ INTRO ══ -->
<div class="stage active" id="stage-intro">
  <div class="intro">
    <div class="intro-label">Prototype</div>
    <h1 class="intro-title">The Scale</h1>
    <p class="intro-sub">Two truths. One balance.<br>Place them where they belong.</p>
    <button class="intro-cta" id="btn-begin">Enter</button>
  </div>
</div>

<!-- ══ ARENA ══ -->
<div class="stage" id="stage-arena">
  <div class="arena" id="arena">

    <div class="status-msg" id="status-msg">Drag each card onto a side</div>

    <!-- SVG Scale -->
    <svg class="scale-svg" id="scale-svg" viewBox="0 0 500 300" overflow="visible">
      <!-- Fulcrum -->
      <polygon id="fulcrum" points="250,220 235,250 265,250" fill="rgba(200,185,165,0.15)"/>
      <!-- Beam -->
      <line id="svg-beam" x1="50" y1="220" x2="450" y2="220" stroke="rgba(200,185,165,0.3)" stroke-width="3" stroke-linecap="round"/>
      <!-- Left chain -->
      <line id="svg-chain-l" x1="80" y1="220" x2="80" y2="160" stroke="rgba(200,185,165,0.12)" stroke-width="1"/>
      <!-- Right chain -->
      <line id="svg-chain-r" x1="420" y1="220" x2="420" y2="160" stroke="rgba(200,185,165,0.12)" stroke-width="1"/>
      <!-- Left pan -->
      <rect id="svg-pan-l" x="30" y="155" width="100" height="6" rx="3" fill="rgba(200,185,165,0.12)"/>
      <!-- Right pan -->
      <rect id="svg-pan-r" x="370" y="155" width="100" height="6" rx="3" fill="rgba(200,185,165,0.12)"/>
    </svg>

    <!-- Drop targets (positioned over pans) -->
    <div class="drop-target drop-target-left" id="dt-left">
      <span class="drop-target-label" id="dt-left-label"></span>
    </div>
    <div class="drop-target drop-target-right" id="dt-right">
      <span class="drop-target-label" id="dt-right-label"></span>
    </div>

    <!-- Card dock -->
    <div class="dock" id="dock">
      <div class="card" id="card-a">
        <p class="card-text" id="card-a-text"></p>
        <span class="card-hint">drag to a side</span>
      </div>
      <div class="card" id="card-b">
        <p class="card-text" id="card-b-text"></p>
        <span class="card-hint">drag to a side</span>
      </div>
    </div>
  </div>
</div>

<!-- ══ REVEAL ══ -->
<div class="reveal-overlay" id="reveal-overlay">
  <div class="reveal-inner">
    <div class="reveal-label">What you collapsed</div>
    <p class="reveal-text" id="reveal-text"></p>
    <p class="reveal-sub">These truths needed space between them.</p>
    <span class="reveal-continue" id="reveal-continue">Continue &rarr;</span>
  </div>
</div>

<!-- ══ CLOSING ══ -->
<div class="stage" id="stage-closing">
  <div class="closing">
    <h2 class="closing-text" id="closing-text"></h2>
    <div class="closing-stats">
      <div class="cstat">
        <div class="cstat-num good" id="stat-held">0</div>
        <div class="cstat-label">Held in balance</div>
      </div>
      <div class="cstat">
        <div class="cstat-num broke" id="stat-broke">0</div>
        <div class="cstat-label">Collapsed together</div>
      </div>
    </div>
    <button class="closing-restart" id="btn-restart">Begin again</button>
  </div>
</div>

<script>
'use strict';

const PAIRS = [
  { a: 'Zoos protect endangered species',        b: 'Zoos profit from captivity' },
  { a: 'Children learn empathy here',             b: 'The animal didn\u2019t choose to teach' },
  { a: 'Conservation requires funding',           b: 'Revenue shapes what gets conserved' },
  { a: 'We call it enrichment',                   b: 'They call it Tuesday' },
  { a: 'The mission statement mentions the wild', b: 'The gift shop doesn\u2019t' }
];

/* ── STATE ── */
let currentRound = 0, heldCount = 0, brokeCount = 0;
let placed = []; // { side: 'left'|'right', text }
let locked = false;

/* ── ELEMENTS ── */
const $ = id => document.getElementById(id);
const stageIntro = $('stage-intro'), stageArena = $('stage-arena'), stageClosing = $('stage-closing');
const statusMsg = $('status-msg');
const cardA = $('card-a'), cardB = $('card-b');
const cardAText = $('card-a-text'), cardBText = $('card-b-text');
const dtLeft = $('dt-left'), dtRight = $('dt-right');
const dtLeftLabel = $('dt-left-label'), dtRightLabel = $('dt-right-label');
const revealOvl = $('reveal-overlay'), revealText = $('reveal-text'), revealCont = $('reveal-continue');
const closingText = $('closing-text'), statHeld = $('stat-held'), statBroke = $('stat-broke');
const counter = $('counter'), progressBar = $('progress');

// SVG elements
const svgBeam   = $('svg-beam');
const svgChainL = $('svg-chain-l');
const svgChainR = $('svg-chain-r');
const svgPanL   = $('svg-pan-l');
const svgPanR   = $('svg-pan-r');

/* ── BUILD DOTS ── */
PAIRS.forEach(() => { const d = document.createElement('div'); d.className = 'pdot'; progressBar.appendChild(d); });
const dots = progressBar.querySelectorAll('.pdot');

/* ── STAGE NAV ── */
function showStage(s) {
  [stageIntro, stageArena, stageClosing].forEach(x => x.classList.remove('active'));
  s.classList.add('active');
}
$('btn-begin').addEventListener('click', () => { showStage(stageArena); loadRound(0); });
$('btn-restart').addEventListener('click', () => {
  currentRound = 0; heldCount = 0; brokeCount = 0; placed = [];
  dots.forEach(d => d.className = 'pdot');
  showStage(stageArena); loadRound(0);
});
revealCont.addEventListener('click', () => {
  revealOvl.classList.remove('active');
  setTimeout(() => advanceRound(), 400);
});

/* ── LOAD ROUND ── */
function loadRound(idx) {
  locked = false;
  currentRound = idx;
  placed = [];

  const pair = PAIRS[idx];
  cardAText.textContent = pair.a;
  cardBText.textContent = pair.b;

  // reset cards
  [cardA, cardB].forEach(c => {
    c.classList.remove('placed', 'dragging');
    c.style.cssText = '';
  });

  // reset drop targets
  dtLeft.classList.remove('filled', 'hover');
  dtRight.classList.remove('filled', 'hover');
  dtLeftLabel.textContent = '';
  dtRightLabel.textContent = '';

  // reset scale
  tiltScale(0);
  svgBeam.style.opacity = '';
  svgBeam.style.transition = 'all 0.6s cubic-bezier(0.25,0.46,0.45,0.94)';

  // status
  statusMsg.className = 'status-msg';
  statusMsg.textContent = 'Drag each card onto a side';

  // counter + dots
  counter.textContent = (idx + 1) + ' / ' + PAIRS.length;
  dots.forEach((d, i) => {
    if (i === idx) d.className = 'pdot active';
  });
}

/* ── SCALE TILT (SVG) ── */
function tiltScale(angle) {
  // angle in degrees, positive = right side heavy
  const rad = angle * Math.PI / 180;
  const cx = 250, cy = 220;
  const armLen = 200;

  // beam endpoints after rotation
  const lx = cx - armLen * Math.cos(rad);
  const ly = cy - armLen * Math.sin(rad);
  const rx = cx + armLen * Math.cos(rad);
  const ry = cy + armLen * Math.sin(rad);

  svgBeam.setAttribute('x1', lx);
  svgBeam.setAttribute('y1', ly);
  svgBeam.setAttribute('x2', rx);
  svgBeam.setAttribute('y2', ry);

  // chains hang down from beam ends
  const chainLen = 60;
  svgChainL.setAttribute('x1', lx); svgChainL.setAttribute('y1', ly);
  svgChainL.setAttribute('x2', lx); svgChainL.setAttribute('y2', ly - chainLen);
  svgChainR.setAttribute('x1', rx); svgChainR.setAttribute('y1', ry);
  svgChainR.setAttribute('x2', rx); svgChainR.setAttribute('y2', ry - chainLen);

  // pans at top of chains
  svgPanL.setAttribute('x', lx - 50); svgPanL.setAttribute('y', ly - chainLen - 6);
  svgPanR.setAttribute('x', rx - 50); svgPanR.setAttribute('y', ry - chainLen - 6);
}

/* ── DRAG SYSTEM ── */
let dragEl = null, dragOffX = 0, dragOffY = 0;

function onDown(e) {
  if (locked) return;
  const card = e.target.closest('.card');
  if (!card || card.classList.contains('placed')) return;

  dragEl = card;
  dragEl.classList.add('dragging');
  dragEl.setPointerCapture(e.pointerId);

  const rect = card.getBoundingClientRect();
  dragOffX = e.clientX - rect.left;
  dragOffY = e.clientY - rect.top;

  card.style.position = 'fixed';
  card.style.left = rect.left + 'px';
  card.style.top = rect.top + 'px';
  card.style.zIndex = '100';
  card.style.margin = '0';
  card.style.width = rect.width + 'px';
}

function onMove(e) {
  if (!dragEl) return;
  dragEl.style.left = (e.clientX - dragOffX) + 'px';
  dragEl.style.top  = (e.clientY - dragOffY) + 'px';

  const cx = e.clientX, cy = e.clientY;
  dtLeft.classList.toggle('hover', isOver(cx, cy, dtLeft));
  dtRight.classList.toggle('hover', isOver(cx, cy, dtRight));
}

function onUp(e) {
  if (!dragEl) return;
  dragEl.classList.remove('dragging');
  dtLeft.classList.remove('hover');
  dtRight.classList.remove('hover');

  const cx = e.clientX, cy = e.clientY;
  const text = dragEl.querySelector('.card-text').textContent;

  if (isOver(cx, cy, dtLeft)) {
    dropCard(dragEl, 'left', text);
  } else if (isOver(cx, cy, dtRight)) {
    dropCard(dragEl, 'right', text);
  } else {
    // snap back
    dragEl.style.cssText = '';
  }
  dragEl = null;
}

function isOver(px, py, target) {
  const r = target.getBoundingClientRect();
  const pad = 20;
  return px >= r.left - pad && px <= r.right + pad &&
         py >= r.top - pad && py <= r.bottom + pad;
}

document.addEventListener('pointerdown', onDown);
document.addEventListener('pointermove', onMove);
document.addEventListener('pointerup', onUp);

/* ── DROP CARD ── */
function dropCard(card, side, text) {
  card.classList.add('placed');
  card.style.cssText = '';

  placed.push({ side, text });

  // show text on drop target
  if (side === 'left') {
    dtLeftLabel.textContent = dtLeftLabel.textContent ? dtLeftLabel.textContent + ' & ' + text : text;
    dtLeft.classList.add('filled');
  } else {
    dtRightLabel.textContent = dtRightLabel.textContent ? dtRightLabel.textContent + ' & ' + text : text;
    dtRight.classList.add('filled');
  }

  // tilt
  const leftW  = placed.filter(p => p.side === 'left').length;
  const rightW = placed.filter(p => p.side === 'right').length;
  tiltScale((rightW - leftW) * 10);

  // check if both placed
  if (placed.length === 2) {
    locked = true;
    setTimeout(() => judge(), 500);
  }
}

/* ── JUDGMENT ── */
function judge() {
  const leftW  = placed.filter(p => p.side === 'left').length;
  const rightW = placed.filter(p => p.side === 'right').length;

  if (leftW === 1 && rightW === 1) {
    // BALANCED
    tiltScale(0);
    svgBeam.style.stroke = 'rgba(104,176,120,0.5)';
    svgPanL.style.fill = 'rgba(104,176,120,0.2)';
    svgPanR.style.fill = 'rgba(104,176,120,0.2)';
    statusMsg.className = 'status-msg balanced';
    statusMsg.textContent = 'Both held.';
    heldCount++;
    dots[currentRound].className = 'pdot done-good';
    setTimeout(() => {
      svgBeam.style.stroke = '';
      svgPanL.style.fill = '';
      svgPanR.style.fill = '';
      advanceRound();
    }, 2200);
  } else {
    // BROKE — both on same side
    const angle = leftW === 2 ? -30 : 30;
    tiltScale(angle);

    setTimeout(() => {
      // crack effect: fade beam
      svgBeam.style.opacity = '0.15';
      svgBeam.style.stroke = 'rgba(226,170,98,0.5)';
      brokeCount++;
      dots[currentRound].className = 'pdot done-bad';

      statusMsg.className = 'status-msg';
      statusMsg.textContent = '';

      setTimeout(() => {
        const texts = placed.map(p => p.text);
        revealText.textContent = texts.join(' \u2014 and \u2014 ');
        revealOvl.classList.add('active');
      }, 600);
    }, 600);
  }
}

/* ── ADVANCE ── */
function advanceRound() {
  if (currentRound < PAIRS.length - 1) {
    loadRound(currentRound + 1);
  } else {
    showClosingScreen();
  }
}

function showClosingScreen() {
  statHeld.textContent = heldCount;
  statBroke.textContent = brokeCount;

  if (brokeCount === 0) closingText.textContent = 'You already knew how to hold both.';
  else if (heldCount > brokeCount) closingText.textContent = 'Some truths are harder to hold than others.';
  else if (heldCount === brokeCount) closingText.textContent = 'Half held, half collapsed. That\u2019s honest.';
  else closingText.textContent = 'The instinct to choose is strong. The practice is holding.';

  showStage(stageClosing);
}
</script>
