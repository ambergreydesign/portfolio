<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Zoo Economy – Money In, Money Out</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100vw; height: 100vh;
      overflow: hidden;
      background: #1a1a1a;
    }

    .slide {
      position: fixed; top: 0; left: 0;
      width: 1920px; height: 1080px;
      background: #c6e9f8;
      transform-origin: 0 0;
    }

    /* ── Full-slide state images ── */
    .state-img {
      position: absolute;
      inset: 0;
      width: 1920px; height: 1080px;
      object-fit: cover;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    .state-img.active { opacity: 1; }

    /* ── Hover zones (invisible, positioned over the legend bar) ── */
    .hz {
      position: absolute;
      cursor: pointer;
      z-index: 10;
    }
  </style>
</head>
<body>

<div class="slide" id="slide">

  <!-- Pre-rendered full-slide images for each state -->
  <img class="state-img active" data-state="default"  src="zoo-assets/default.png"  alt="Zoo Economy Map – Default view">
  <img class="state-img"        data-state="info"     src="zoo-assets/info.png"     alt="Zoo Economy Map – Info overlay">
  <img class="state-img"        data-state="area"     src="zoo-assets/area.png"     alt="Zoo Economy Map – Area of Circle legend">
  <img class="state-img"        data-state="color"    src="zoo-assets/color.png"    alt="Zoo Economy Map – Color of Circle legend">
  <img class="state-img"        data-state="green"    src="zoo-assets/green.png"    alt="Zoo Economy Map – Dark Green Center Circle">
  <img class="state-img"        data-state="nodot-dg" src="zoo-assets/nodot-dg.png" alt="Zoo Economy Map – No Dot Dark Green">
  <img class="state-img"        data-state="nodot-ng" src="zoo-assets/nodot-ng.png" alt="Zoo Economy Map – No Dot Non-Green">
  <img class="state-img"        data-state="halo"     src="zoo-assets/halo.png"     alt="Zoo Economy Map – Outer Halo">

  <!-- Hover zones matching the legend bar positions -->
  <!-- Area of Circle -->
  <div class="hz" data-state="area"     style="left:853px; top:44px;  width:216px; height:173px;"></div>
  <!-- Color of Circle -->
  <div class="hz" data-state="color"    style="left:1069px;top:44px;  width:214px; height:173px;"></div>
  <!-- Dark Green Center -->
  <div class="hz" data-state="green"    style="left:1283px;top:44px;  width:206px; height:173px;"></div>
  <!-- No Dot – Dark Green -->
  <div class="hz" data-state="nodot-dg" style="left:1489px;top:44px;  width:168px; height:93px;"></div>
  <!-- No Dot – Non-Green -->
  <div class="hz" data-state="nodot-ng" style="left:1489px;top:137px; width:168px; height:80px;"></div>
  <!-- Outer Halo -->
  <div class="hz" data-state="halo"     style="left:1657px;top:44px;  width:227px; height:173px;"></div>
  <!-- Info panel (bottom-right dark box) -->
  <div class="hz" data-state="info"     style="left:1375px;top:505px; width:432px; height:487px;"></div>

</div>

<script>
  // Scale slide to fit viewport
  function scaleSlide() {
    const slide = document.getElementById('slide');
    const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
    const ox = (window.innerWidth  - 1920 * scale) / 2;
    const oy = (window.innerHeight - 1080 * scale) / 2;
    slide.style.transform = 'translate(' + ox + 'px,' + oy + 'px) scale(' + scale + ')';
  }
  scaleSlide();
  window.addEventListener('resize', scaleSlide);

  // State image switching
  var defaultImg = document.querySelector('.state-img[data-state="default"]');
  var allImgs = document.querySelectorAll('.state-img');

  document.querySelectorAll('.hz').forEach(function(zone) {
    zone.addEventListener('mouseenter', function() {
      var state = zone.dataset.state;
      allImgs.forEach(function(img) {
        img.classList.toggle('active', img.dataset.state === state);
      });
    });
    zone.addEventListener('mouseleave', function() {
      allImgs.forEach(function(img) {
        img.classList.toggle('active', img.dataset.state === 'default');
      });
    });
  });
</script>
</body>
</html>
