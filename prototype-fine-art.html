<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fine Art — Constellation</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050a10;
  --text: rgba(228,218,200,0.88);
  --text-dim: rgba(200,185,165,0.45);
  --accent: rgba(190,155,90,0.80);
  --accent-dim: rgba(190,155,90,0.30);
  --ease: cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  cursor: default;
  user-select: none;
}

/* ── DEEP SPACE BACKGROUND ── */
#starfield {
  position: fixed;
  inset: 0;
  z-index: 0;
}

/* ── NEBULA LAYER (colored fog) ── */
#nebula {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  opacity: 0.5;
}

/* ── CANVAS (pannable / zoomable) ── */
#universe {
  position: absolute;
  width: 100%;
  height: 100%;
  z-index: 1;
}

#cosmos {
  position: absolute;
  transform-origin: 0 0;
  will-change: transform;
}

/* ── ARTWORK NODES ── */
.star {
  position: absolute;
  border-radius: 50%;
  cursor: pointer;
  z-index: 1;
  animation: starTwinkle var(--twinkle-dur, 4s) ease-in-out var(--twinkle-delay, 0s) infinite;
}
.star:hover {
  animation: none;
  transform: scale(1.25);
  z-index: 10;
  transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}

@keyframes starTwinkle {
  0%, 100% { transform: scale(1); }
  30%      { transform: scale(var(--twinkle-min, 0.92)); }
  60%      { transform: scale(var(--twinkle-max, 1.06)); }
  85%      { transform: scale(0.97); }
}

/* Pulsing aura ring */
.star-aura {
  position: absolute;
  inset: -60%;
  border-radius: 50%;
  pointer-events: none;
  opacity: 0;
  animation: auraPulse 4s ease-in-out infinite;
}

@keyframes auraPulse {
  0%, 100% { opacity: 0; transform: scale(0.85); }
  50%      { opacity: 0.3; transform: scale(1); }
}

/* Soft glow underneath */
.star-glow {
  position: absolute;
  inset: -50%;
  border-radius: 50%;
  pointer-events: none;
  opacity: 0.35;
  transition: opacity 0.5s ease, inset 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}

.star:hover .star-glow {
  opacity: 1;
  inset: -90%;
}
.star:hover .star-aura {
  animation-duration: 1s;
  opacity: 0.5;
}

/* Gravitational lens ring — expands on hover */
.star-ring {
  position: absolute;
  inset: -20%;
  border-radius: 50%;
  border: 1px solid transparent;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.5s ease, inset 0.6s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.5s ease;
}

.star:hover .star-ring {
  opacity: 1;
  inset: -45%;
  border-color: var(--star-color, rgba(100,140,200,0.15));
}

/* Event horizon — inner bright ring that appears on hover */
.star-horizon {
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  pointer-events: none;
  opacity: 0;
  border: 1.5px solid rgba(255,250,230,0.25);
  box-shadow:
    0 0 12px var(--star-color, rgba(100,140,200,0.3)),
    inset 0 0 12px var(--star-color, rgba(100,140,200,0.15));
  transition: opacity 0.4s ease 0.1s;
  z-index: 2;
}
.star:hover .star-horizon {
  opacity: 1;
}

/* Light rays that burst outward on hover */
.star-rays {
  position: absolute;
  inset: -100%;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.5s ease;
  z-index: 0;
}
.star:hover .star-rays { opacity: 1; }

.star-ray {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 1px;
  height: 40%;
  transform-origin: center top;
  background: linear-gradient(to bottom, var(--star-color, rgba(100,140,200,0.2)), transparent 80%);
}

/* The image orb */
.star-core {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow:
    0 0 30px rgba(0,0,0,0.6),
    0 4px 16px rgba(0,0,0,0.5),
    inset 0 0 20px rgba(0,0,0,0.4);
  position: relative;
  z-index: 1;
  transition: box-shadow 0.5s ease, border-color 0.5s ease;
}

/* Glass orb specular highlight */
.star-core::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background:
    radial-gradient(ellipse 60% 40% at 35% 25%, rgba(255,255,255,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 80% 80% at 50% 110%, rgba(0,0,0,0.35) 0%, transparent 60%);
  z-index: 3;
  pointer-events: none;
  transition: opacity 0.5s ease;
}

/* Subtle rim light on the orb edge */
.star-core::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  box-shadow:
    inset 0 -2px 6px rgba(0,0,0,0.4),
    inset 0 2px 8px rgba(255,255,255,0.06);
  z-index: 4;
  pointer-events: none;
}

.star:hover .star-core {
  border-color: rgba(255,250,230,0.35);
  box-shadow:
    0 0 50px var(--star-color, rgba(100,140,200,0.3)),
    0 0 100px var(--star-color, rgba(100,140,200,0.15)),
    0 6px 20px rgba(0,0,0,0.4),
    inset 0 0 15px rgba(0,0,0,0.15);
}

.star:hover .star-core::before {
  background:
    radial-gradient(ellipse 60% 40% at 35% 25%, rgba(255,255,255,0.25) 0%, transparent 60%),
    radial-gradient(ellipse 80% 80% at 50% 110%, rgba(0,0,0,0.25) 0%, transparent 60%);
}

.star-core img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.8s var(--ease), filter 0.5s ease;
  filter: brightness(0.85) saturate(0.9) contrast(1.05);
}

.star:hover .star-core img {
  transform: scale(1.08);
  filter: brightness(1.05) saturate(1.1) contrast(1);
}

/* Label */
.star-label {
  position: absolute;
  left: 50%;
  transform: translateX(-50%) translateY(6px);
  bottom: -34px;
  white-space: nowrap;
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px;
  font-style: italic;
  font-weight: 300;
  color: rgba(228,218,200,0);
  text-align: center;
  letter-spacing: 0.08em;
  transition: color 0.4s ease 0.1s, transform 0.4s ease 0.1s, text-shadow 0.4s ease 0.1s;
  pointer-events: none;
  z-index: 2;
}

.star-year {
  position: absolute;
  left: 50%;
  transform: translateX(-50%) translateY(6px);
  bottom: -50px;
  white-space: nowrap;
  font-family: 'DM Sans', sans-serif;
  font-size: 7px;
  font-weight: 400;
  letter-spacing: 0.25em;
  color: rgba(190,155,90,0);
  text-align: center;
  transition: color 0.4s ease 0.15s, transform 0.4s ease 0.15s;
  pointer-events: none;
  z-index: 2;
}

.star:hover .star-label {
  color: rgba(228,218,200,0.92);
  transform: translateX(-50%) translateY(0);
  text-shadow: 0 0 24px rgba(228,218,200,0.4), 0 2px 8px rgba(0,0,0,0.6);
}
.star:hover .star-year {
  color: rgba(190,155,90,0.6);
  transform: translateX(-50%) translateY(0);
}

/* ── ORBIT RINGS ── */
.orbit-ring {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  animation: orbitRotate 120s linear infinite;
}

@keyframes orbitRotate {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

/* ── SHOOTING STARS (single dot) ── */
.shooting-star {
  position: fixed;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: rgba(255,252,240,1);
  box-shadow:
    0 0 6px 2px rgba(255,250,230,0.9),
    0 0 14px 4px rgba(220,200,160,0.5),
    0 0 28px 8px rgba(190,155,90,0.2);
  pointer-events: none;
  z-index: 0;
  opacity: 0;
}

@keyframes shoot {
  0%   { opacity: 0; transform: translate(0, 0); }
  5%   { opacity: 1; }
  80%  { opacity: 0.7; }
  100% { opacity: 0; transform: translate(var(--dx), var(--dy)); }
}

/* ── FLOATING DUST PARTICLES ── */
.dust {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  opacity: 0;
}

@keyframes dustFloat {
  0%, 100% { opacity: 0; transform: translate(0, 0); }
  20%      { opacity: var(--dust-a, 0.3); }
  80%      { opacity: var(--dust-a, 0.3); }
  50%      { transform: translate(var(--dust-dx, 10px), var(--dust-dy, -20px)); }
}

/* ── CONSTELLATION LINES ── */
#lineCanvas {
  position: absolute;
  top: 0; left: 0;
  pointer-events: none;
  z-index: 0;
  transform-origin: 0 0;
}

/* ── NODE SPARKLES (tiny orbiting dots) ── */
.node-sparkle {
  position: absolute;
  width: 2px; height: 2px;
  border-radius: 50%;
  pointer-events: none;
  z-index: 2;
}

/* ── DETAIL PANEL ── */
#detail-panel {
  position: fixed;
  top: 0; right: 0;
  width: 480px;
  height: 100%;
  background: linear-gradient(135deg, rgba(6,12,20,0.97), rgba(10,18,28,0.99));
  border-left: 1px solid rgba(255,255,255,0.06);
  z-index: 100;
  transform: translateX(100%);
  transition: transform 0.55s var(--ease);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  backdrop-filter: blur(40px);
  -webkit-backdrop-filter: blur(40px);
}
#detail-panel.open { transform: translateX(0); }

#detail-close {
  position: absolute;
  top: 24px; right: 24px;
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.04);
  color: rgba(200,185,165,0.7);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.25s ease, color 0.25s ease;
  z-index: 2;
}
#detail-close:hover {
  background: rgba(255,255,255,0.1);
  color: rgba(200,185,165,1);
}

#detail-image {
  width: 100%;
  padding: 48px 40px 0;
}
#detail-image img {
  width: 100%;
  display: block;
  border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.06);
}

#detail-info { padding: 32px 40px 48px; }

#detail-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px;
  font-weight: 300;
  font-style: italic;
  color: rgba(235,225,208,0.95);
  letter-spacing: 0.03em;
  line-height: 1.2;
  margin-bottom: 12px;
}

#detail-meta {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 24px;
}

#detail-medium {
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 300;
  color: rgba(200,185,165,0.65);
  line-height: 1.6;
  margin-bottom: 16px;
}

.detail-divider {
  width: 40px;
  height: 1px;
  background: var(--accent-dim);
  margin: 20px 0;
}

#detail-nav {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-top: 8px;
  flex-wrap: wrap;
}

.nav-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(190,155,90,0.2);
  border: none;
  cursor: pointer;
  padding: 0;
  transition: background 0.3s ease, transform 0.3s ease;
}
.nav-dot:hover { background: rgba(190,155,90,0.5); }
.nav-dot.active {
  background: rgba(190,155,90,0.8);
  transform: scale(1.5);
}

/* ── HUD ── */
#hud {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 50;
  display: flex;
  gap: 8px;
  align-items: center;
}

.hud-chip {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 100px;
  padding: 7px 16px;
  font-family: 'DM Sans', sans-serif;
  font-size: 9px;
  font-weight: 400;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(200,185,165,0.5);
  cursor: pointer;
  transition: all 0.3s ease;
}
.hud-chip:hover {
  background: rgba(255,255,255,0.08);
  color: rgba(200,185,165,0.8);
}
.hud-chip.active {
  background: rgba(190,155,90,0.12);
  border-color: rgba(190,155,90,0.25);
  color: rgba(220,195,130,0.9);
}

/* ── ZOOM INDICATOR ── */
#zoom-level {
  position: fixed;
  bottom: 28px;
  right: 28px;
  font-family: 'DM Sans', sans-serif;
  font-size: 9px;
  letter-spacing: 0.15em;
  color: rgba(200,185,165,0.25);
  z-index: 50;
}

/* ── TITLE ── */
#page-title {
  position: fixed;
  top: 28px;
  left: 32px;
  z-index: 50;
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  font-weight: 300;
  font-style: italic;
  color: rgba(228,218,200,0.35);
  letter-spacing: 0.06em;
  pointer-events: none;
}

#hint {
  position: fixed;
  top: 56px;
  left: 32px;
  z-index: 50;
  font-family: 'DM Sans', sans-serif;
  font-size: 9px;
  font-weight: 300;
  letter-spacing: 0.15em;
  color: rgba(200,185,165,0.2);
  pointer-events: none;
  opacity: 1;
  transition: opacity 2s ease 5s;
}
#hint.faded { opacity: 0; }

/* ── BACK LINK ── */
.back-link {
  position: fixed;
  top: 28px; right: 32px;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 100px;
  padding: 8px 16px 8px 12px;
  cursor: pointer;
  color: rgba(200,185,165,0.5);
  font-family: 'DM Sans', sans-serif;
  font-size: 9px;
  font-weight: 400;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  transition: all 0.25s ease;
  z-index: 50;
  text-decoration: none;
}
.back-link:hover {
  background: rgba(255,255,255,0.08);
  color: rgba(200,185,165,0.9);
}

@media (max-width: 768px) {
  #detail-panel { width: 100%; }
  #hud { bottom: 16px; gap: 4px; flex-wrap: wrap; justify-content: center; }
  .hud-chip { font-size: 8px; padding: 6px 12px; }
}
</style>
</head>

  { title: "Let Me Out", w: 11, h: 14, medium: "Pencil on Paper", cat: "pencil", year: 2016, img: IMG+'Let Me Out 11x14.webp' },
  { title: "Mandrillus", w: 11, h: 14, medium: "Pencil on Paper", cat: "pencil", year: 2016, img: IMG+'Mandrillus 11x14.webp' },
  { title: "Ochraceus", w: 11, h: 14, medium: "Pencil on Paper", cat: "pencil", year: 2018, img: IMG+'Ochraceus 11x14.webp' },

  { title: "The Sophia", w: 60, h: 48, medium: "Oil on Canvas", cat: "oil", year: 2014, img: IMG+'The Sophia (back) 60x48.webp' }
];

const PALETTE = {
  oil:    { glow: [80,120,180],  line: 'rgba(80,120,180,0.12)'  },
  ink:    { glow: [140,90,200],  line: 'rgba(140,90,200,0.12)'  },
  gold:   { glow: [210,175,90],  line: 'rgba(210,175,90,0.15)'  },
  pencil: { glow: [180,175,165], line: 'rgba(180,175,165,0.10)' }
};

/* ═══════════════════════════════════════════
   1. DEEP SPACE — twinkling stars + nebula
   ═══════════════════════════════════════════ */
const sfCanvas = document.getElementById('starfield');
const sfCtx = sfCanvas.getContext('2d');
const nebCanvas = document.getElementById('nebula');
const nebCtx = nebCanvas.getContext('2d');
let bgStars = [];

function initBg() {
  const dpr = window.devicePixelRatio || 1;
  const w = window.innerWidth;
  const h = window.innerHeight;

  sfCanvas.width = w * dpr;
  sfCanvas.height = h * dpr;
  sfCanvas.style.width = w + 'px';
  sfCanvas.style.height = h + 'px';
  sfCtx.scale(dpr, dpr);

  nebCanvas.width = w * dpr;
  nebCanvas.height = h * dpr;
  nebCanvas.style.width = w + 'px';
  nebCanvas.style.height = h + 'px';
  nebCtx.scale(dpr, dpr);

  // Stars
  bgStars = [];
  for (let i = 0; i < 900; i++) {
    bgStars.push({
      x: Math.random() * w,
      y: Math.random() * h,
      r: Math.random() < 0.92 ? Math.random() * 0.8 : 0.8 + Math.random() * 1.2,
      a: 0.08 + Math.random() * 0.55,
      speed: 0.001 + Math.random() * 0.006,
      phase: Math.random() * Math.PI * 2,
      hue: Math.random() > 0.7 ? (Math.random() > 0.5 ? '#c8b89a' : '#8ab4d8') : '#d4cec0'
    });
  }

  // Nebula clouds (static, drawn once)
  drawNebula(w, h);
}

function drawNebula(w, h) {
  nebCtx.clearRect(0, 0, w, h);
  const clouds = [
    { x: w * 0.2,  y: h * 0.3,  r: 300, color: [60,40,120]  },
    { x: w * 0.7,  y: h * 0.2,  r: 250, color: [40,80,140]  },
    { x: w * 0.5,  y: h * 0.7,  r: 350, color: [100,60,30]  },
    { x: w * 0.85, y: h * 0.6,  r: 200, color: [80,50,120]  },
    { x: w * 0.3,  y: h * 0.8,  r: 280, color: [30,70,100]  },
  ];
  clouds.forEach(c => {
    const g = nebCtx.createRadialGradient(c.x, c.y, 0, c.x, c.y, c.r);
    g.addColorStop(0, `rgba(${c.color.join(',')},0.08)`);
    g.addColorStop(0.5, `rgba(${c.color.join(',')},0.03)`);
    g.addColorStop(1, 'transparent');
    nebCtx.fillStyle = g;
    nebCtx.fillRect(0, 0, w, h);
  });
}

function drawStars(t) {
  const w = sfCanvas.width / (window.devicePixelRatio || 1);
  const h = sfCanvas.height / (window.devicePixelRatio || 1);
  sfCtx.clearRect(0, 0, w, h);

  bgStars.forEach(s => {
    const twinkle = 0.4 + 0.6 * Math.sin(t * s.speed + s.phase);
    sfCtx.globalAlpha = s.a * twinkle;
    sfCtx.fillStyle = s.hue;
    sfCtx.beginPath();
    sfCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    sfCtx.fill();

    // Bright stars get a cross-flare
    if (s.r > 1.2 && twinkle > 0.8) {
      sfCtx.globalAlpha = (twinkle - 0.8) * 2 * s.a * 0.3;
      sfCtx.strokeStyle = s.hue;
      sfCtx.lineWidth = 0.3;
      sfCtx.beginPath();
      sfCtx.moveTo(s.x - s.r * 4, s.y);
      sfCtx.lineTo(s.x + s.r * 4, s.y);
      sfCtx.moveTo(s.x, s.y - s.r * 4);
      sfCtx.lineTo(s.x, s.y + s.r * 4);
      sfCtx.stroke();
    }
  });

  requestAnimationFrame(drawStars);
}

initBg();
requestAnimationFrame(drawStars);
window.addEventListener('resize', initBg);

/* ═══════════════════════════════════════════
   2. SHOOTING STARS
   ═══════════════════════════════════════════ */
function launchShooter() {
  const el = document.createElement('div');
  el.className = 'shooting-star';
  const startX = Math.random() * window.innerWidth;
  const startY = Math.random() * window.innerHeight;
  const angle = Math.random() * Math.PI * 2;
  const dist = 250 + Math.random() * 400;
  const dx = Math.cos(angle) * dist;
  const dy = Math.sin(angle) * dist;
  const dur = 0.8 + Math.random() * 0.8;

  el.style.cssText = `
    left: ${startX}px;
    top: ${startY}px;
    --dx: ${dx}px;
    --dy: ${dy}px;
    animation: shoot ${dur}s ease-out forwards;
  `;

  document.getElementById('shooters').appendChild(el);
  setTimeout(() => el.remove(), dur * 1000 + 100);
}

// Random shooting stars every 3–8 seconds
function scheduleShooter() {
  launchShooter();
  setTimeout(scheduleShooter, 3000 + Math.random() * 5000);
}
setTimeout(scheduleShooter, 2000);

/* ═══════════════════════════════════════════
   3. LAYOUT — SPIRAL GALAXY WITH ARMS
   ═══════════════════════════════════════════ */
const FIELD = 5000;
const CX = FIELD / 2;
const CY = FIELD / 2;

const cosmos = document.getElementById('cosmos');
cosmos.style.width = FIELD + 'px';
cosmos.style.height = FIELD + 'px';

const sorted = artworks.map((a, i) => ({ ...a, _idx: i }))
  .sort((a, b) => a.year - b.year);

const starEls = [];
const starPositions = [];

/*
 * Spiral galaxy layout:
 * - 3 logarithmic spiral arms
 * - Oldest works near the dense core, newest at the outer edges
 * - Slight random scatter perpendicular to each arm for organic feel
 * - Core cluster of small, older works at center
 */
const NUM_ARMS = 3;
const ARM_OFFSET = (Math.PI * 2) / NUM_ARMS;
const TIGHTNESS = 0.28;          // lower = tighter spiral
const MAX_RADIUS = 1900;
const CORE_RADIUS = 120;
const SCATTER = 0.18;            // perpendicular scatter (fraction of radius)

sorted.forEach((art, i) => {
  const t = i / (sorted.length - 1);   // 0..1 progress through sorted list
  const arm = i % NUM_ARMS;            // which arm this star belongs to

  // Logarithmic spiral: r = a * e^(b*theta)
  const theta = t * Math.PI * 2.8;     // ~2.8 rotations total
  const radius = CORE_RADIUS + t * MAX_RADIUS;

  // Arm rotation offset
  const armAngle = theta + arm * ARM_OFFSET;

  // Add scatter perpendicular to arm direction (more scatter further out)
  const scatterAmount = radius * SCATTER * (0.4 + t * 0.6);
  const scatterAngle = armAngle + Math.PI / 2;
  const scatter = (Math.random() - 0.5) * 2 * scatterAmount;

  const x = CX + Math.cos(armAngle) * radius + Math.cos(scatterAngle) * scatter;
  const y = CY + Math.sin(armAngle) * radius * 0.55 + Math.sin(scatterAngle) * scatter * 0.55; // flatten to ellipse

  const area = art.w * art.h;
  const sz = Math.min(150, Math.max(60, 60 + (area / 3600) * 90));

  const [gr, gg, gb] = PALETTE[art.cat].glow;

  const star = document.createElement('div');
  star.className = 'star';
  star.dataset.cat = art.cat;
  star.dataset.idx = art._idx;
  const twinkleDur = 3 + Math.random() * 5;
  const twinkleDelay = Math.random() * twinkleDur;
  const twinkleMin = 0.88 + Math.random() * 0.08;
  const twinkleMax = 1.03 + Math.random() * 0.06;
  star.style.cssText = `
    left: ${x - sz / 2}px;
    top: ${y - sz / 2}px;
    width: ${sz}px;
    height: ${sz}px;
    --star-color: rgba(${gr},${gg},${gb},0.25);
    --twinkle-dur: ${twinkleDur.toFixed(1)}s;
    --twinkle-delay: ${twinkleDelay.toFixed(1)}s;
    --twinkle-min: ${twinkleMin.toFixed(3)};
    --twinkle-max: ${twinkleMax.toFixed(3)};
  `;

  // Stagger the aura pulse
  const auraDelay = (i * 0.3) % 4;

  // Generate light ray spokes
  const rayCount = 6;
  let raysHTML = '';
  for (let r = 0; r < rayCount; r++) {
    const deg = (360 / rayCount) * r + Math.random() * 15;
    const len = 30 + Math.random() * 20;
    raysHTML += `<div class="star-ray" style="
      transform: rotate(${deg}deg);
      height: ${len}%;
      background: linear-gradient(to bottom, rgba(${gr},${gg},${gb},0.18), transparent 80%);
    "></div>`;
  }

  star.innerHTML = `
    <div class="star-rays">${raysHTML}</div>
    <div class="star-aura" style="
      background: radial-gradient(circle, rgba(${gr},${gg},${gb},0.15) 0%, transparent 70%);
      animation-delay: ${auraDelay}s;
    "></div>
    <div class="star-glow" style="
      background: radial-gradient(circle, rgba(${gr},${gg},${gb},0.3) 0%, rgba(${gr},${gg},${gb},0.05) 50%, transparent 70%);
    "></div>
    <div class="star-ring" style="
      border-color: rgba(${gr},${gg},${gb},0.15);
      animation: orbitRotate ${20 + Math.random() * 20}s linear infinite;
      border-style: dashed;
      border-width: 0.5px;
    "></div>
    <div class="star-horizon" style="
      --star-color: rgba(${gr},${gg},${gb},0.3);
    "></div>
    <div class="star-core">
      <img src="${encodeURI(art.img)}" alt="${art.title}">
    </div>
    <div class="star-label">${art.title}</div>
    <div class="star-year">${art.year}</div>
  `;

  star._art = art;
  star._cx = x;
  star._cy = y;
  star._sz = sz;

  star.addEventListener('click', (e) => {
    e.stopPropagation();
    openDetail(art._idx);
  });

  cosmos.appendChild(star);
  starEls.push(star);
  starPositions.push({ x, y, cat: art.cat, sz });

  // Add 2-3 tiny orbiting sparkle dots per star
  const sparkleCount = 2 + Math.floor(Math.random() * 2);
  for (let s = 0; s < sparkleCount; s++) {
    const dot = document.createElement('div');
    dot.className = 'node-sparkle';
    dot.dataset.cat = art.cat;
    const orbitR = sz * 0.6 + Math.random() * sz * 0.3;
    const orbitSpeed = 8 + Math.random() * 12;
    const orbitPhase = Math.random() * Math.PI * 2;
    const bright = Math.random() > 0.5;
    dot.style.cssText = `
      left: ${x}px;
      top: ${y}px;
      width: ${bright ? 3 : 2}px;
      height: ${bright ? 3 : 2}px;
      background: rgba(${gr},${gg},${gb},${bright ? 0.8 : 0.4});
      ${bright ? `box-shadow: 0 0 4px rgba(${gr},${gg},${gb},0.6);` : ''}
    `;
    dot._cx = x;
    dot._cy = y;
    dot._orbitR = orbitR;
    dot._speed = orbitSpeed;
    dot._phase = orbitPhase;
    cosmos.appendChild(dot);
  }
});

/* ═══════════════════════════════════════════
   4. ANIMATED CONSTELLATION LINES (canvas)
   ═══════════════════════════════════════════ */
const lineCanvas = document.getElementById('lineCanvas');
const lineCtx = lineCanvas.getContext('2d');
lineCanvas.width = FIELD;
lineCanvas.height = FIELD;
lineCanvas.style.width = FIELD + 'px';
lineCanvas.style.height = FIELD + 'px';

// Build connection pairs
const connections = [];
const categories = ['oil', 'ink', 'gold', 'pencil'];
categories.forEach(cat => {
  const catStars = starEls.filter(s => s.dataset.cat === cat);
  catStars.forEach((s, i) => {
    const nearest = catStars
      .filter((_, j) => j !== i)
      .map(o => ({ el: o, dist: Math.hypot(s._cx - o._cx, s._cy - o._cy) }))
      .sort((a, b) => a.dist - b.dist)
      .slice(0, 2);
    nearest.forEach(n => {
      if (n.dist < 1000) {
        // Avoid duplicate lines
        const key = [s._cx, s._cy, n.el._cx, n.el._cy].sort().join(',');
        if (!connections.find(c => c.key === key)) {
          connections.push({
            key,
            x1: s._cx, y1: s._cy,
            x2: n.el._cx, y2: n.el._cy,
            cat,
            dist: n.dist
          });
        }
      }
    });
  });
});

// Draw lines with traveling light pulses
function drawLines(t) {
  lineCtx.clearRect(0, 0, FIELD, FIELD);

  connections.forEach(c => {
    const pal = PALETTE[c.cat];
    const [r, g, b] = pal.glow;

    // Base line
    lineCtx.strokeStyle = `rgba(${r},${g},${b},0.06)`;
    lineCtx.lineWidth = 0.5;
    lineCtx.beginPath();
    lineCtx.moveTo(c.x1, c.y1);
    lineCtx.lineTo(c.x2, c.y2);
    lineCtx.stroke();

    // Traveling light pulse
    const speed = 0.0003;
    const progress = ((t * speed + c.x1 * 0.001) % 1 + 1) % 1;
    const px = c.x1 + (c.x2 - c.x1) * progress;
    const py = c.y1 + (c.y2 - c.y1) * progress;

    const pulseGrad = lineCtx.createRadialGradient(px, py, 0, px, py, 12);
    pulseGrad.addColorStop(0, `rgba(${r},${g},${b},0.5)`);
    pulseGrad.addColorStop(1, 'transparent');
    lineCtx.fillStyle = pulseGrad;
    lineCtx.fillRect(px - 12, py - 12, 24, 24);

    // Second pulse offset
    const p2 = ((progress + 0.5) % 1);
    const px2 = c.x1 + (c.x2 - c.x1) * p2;
    const py2 = c.y1 + (c.y2 - c.y1) * p2;
    const pg2 = lineCtx.createRadialGradient(px2, py2, 0, px2, py2, 8);
    pg2.addColorStop(0, `rgba(${r},${g},${b},0.25)`);
    pg2.addColorStop(1, 'transparent');
    lineCtx.fillStyle = pg2;
    lineCtx.fillRect(px2 - 8, py2 - 8, 16, 16);
  });

  requestAnimationFrame(drawLines);
}
requestAnimationFrame(drawLines);

/* ═══════════════════════════════════════════
   5. ORBIT RINGS + DUST PARTICLES
   ═══════════════════════════════════════════ */
[300, 700, 1200, 1800].forEach((r, i) => {
  const ring = document.createElement('div');
  ring.className = 'orbit-ring';
  const rY = r * 0.55; // elliptical to match galaxy flattening
  ring.style.cssText = `
    left: ${CX - r}px; top: ${CY - rY}px;
    width: ${r * 2}px; height: ${rY * 2}px;
    border: 1px ${i % 2 === 0 ? 'solid' : 'dashed'} rgba(190,155,90,0.02);
    animation-duration: ${80 + i * 40}s;
    animation-direction: ${i % 2 === 0 ? 'normal' : 'reverse'};
  `;
  cosmos.appendChild(ring);
});

// Floating dust particles scattered across the field
for (let i = 0; i < 120; i++) {
  const dust = document.createElement('div');
  dust.className = 'dust';
  const dx = (Math.random() - 0.5) * 40;
  const dy = (Math.random() - 0.5) * 40;
  const a = 0.1 + Math.random() * 0.25;
  const sz = 1 + Math.random() * 2;
  const dur = 6 + Math.random() * 10;
  const delay = Math.random() * dur;
  const hue = Math.random() > 0.6 ? 'rgba(190,155,90,' : 'rgba(180,200,220,';
  dust.style.cssText = `
    left: ${Math.random() * FIELD}px;
    top: ${Math.random() * FIELD}px;
    width: ${sz}px; height: ${sz}px;
    background: ${hue}${a});
    --dust-a: ${a};
    --dust-dx: ${dx}px;
    --dust-dy: ${dy}px;
    animation: dustFloat ${dur}s ease-in-out ${delay}s infinite;
  `;
  cosmos.appendChild(dust);
}

/* ═══════════════════════════════════════════
   6. ORBITING SPARKLES ANIMATION
   ═══════════════════════════════════════════ */
const sparkles = document.querySelectorAll('.node-sparkle');
function animateSparkles(t) {
  const time = t * 0.001;
  sparkles.forEach(dot => {
    const angle = time / dot._speed + dot._phase;
    const x = dot._cx + Math.cos(angle) * dot._orbitR;
    const y = dot._cy + Math.sin(angle) * dot._orbitR;
    dot.style.left = x + 'px';
    dot.style.top = y + 'px';
  });
  requestAnimationFrame(animateSparkles);
}
requestAnimationFrame(animateSparkles);

/* ═══════════════════════════════════════════
   7. STAR DRIFT (subtle breathing motion)
   ═══════════════════════════════════════════ */
const t0 = Date.now();
function drift() {
  const t = (Date.now() - t0) * 0.00008;
  starEls.forEach((star, i) => {
    const ox = Math.sin(t * 1.3 + i * 2.1) * 4;
    const oy = Math.cos(t * 1.7 + i * 1.6) * 4;
    star.style.transform = `translate(${ox}px, ${oy}px)`;
  });
  requestAnimationFrame(drift);
}
drift();

/* ═══════════════════════════════════════════
   8. CENTERED VIEW & ZOOM
   ═══════════════════════════════════════════ */
let scale = 0.30;

function applyTransform() {
  const tx = window.innerWidth / 2 - CX * scale;
  const ty = window.innerHeight / 2 - CY * scale;
  const t = `translate(${tx}px, ${ty}px) scale(${scale})`;
  cosmos.style.transform = t;
  lineCanvas.style.transform = t;
  document.getElementById('zoom-level').textContent = scale.toFixed(1) + '\u00d7';
}
applyTransform();

/* Scroll to zoom */
document.addEventListener('wheel', (e) => {
  if (e.target.closest('#detail-panel')) return;
  e.preventDefault();
  const f = e.deltaY > 0 ? 0.92 : 1.08;
  scale = Math.min(1.5, Math.max(0.15, scale * f));
  applyTransform();
  document.getElementById('hint').classList.add('faded');
}, { passive: false });

/* Touch pinch zoom */
let lastTouchDist = 0;
document.addEventListener('touchstart', (e) => {
  if (e.touches.length === 2) {
    lastTouchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
  }
}, { passive: true });
document.addEventListener('touchmove', (e) => {
  if (e.touches.length === 2) {
    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    scale = Math.min(1.5, Math.max(0.15, scale * (d / lastTouchDist)));
    lastTouchDist = d;
    applyTransform();
  }
}, { passive: true });

/* Recenter on resize */
window.addEventListener('resize', applyTransform);

/* ═══════════════════════════════════════════
   9. DETAIL PANEL
   ═══════════════════════════════════════════ */
const panel = document.getElementById('detail-panel');
let currentIdx = -1;

function openDetail(idx) {
  const art = artworks[idx];
  currentIdx = idx;
  document.getElementById('detail-image').querySelector('img').src = encodeURI(art.img);
  document.getElementById('detail-title').textContent = art.title;
  document.getElementById('detail-meta').textContent = `${art.w}\u00d7${art.h}\u2033 \u00b7 ${art.year}`;
  document.getElementById('detail-medium').textContent = art.medium;

  const nav = document.getElementById('detail-nav');
  nav.innerHTML = '';
  artworks.forEach((a, i) => {
    const dot = document.createElement('button');
    dot.className = 'nav-dot' + (i === idx ? ' active' : '');
    dot.title = a.title;
    dot.addEventListener('click', () => openDetail(i));
    nav.appendChild(dot);
  });

  panel.classList.add('open');
}

document.getElementById('detail-close').addEventListener('click', () => panel.classList.remove('open'));
document.addEventListener('keydown', (e) => {
  if (!panel.classList.contains('open')) return;
  if (e.key === 'Escape') panel.classList.remove('open');
  if (e.key === 'ArrowRight') openDetail((currentIdx + 1) % artworks.length);
  if (e.key === 'ArrowLeft') openDetail((currentIdx - 1 + artworks.length) % artworks.length);
});

/* ═══════════════════════════════════════════
   10. HUD FILTERS
   ═══════════════════════════════════════════ */
let activeFilter = 'all';
document.querySelectorAll('.hud-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    activeFilter = chip.dataset.filter;
    document.querySelectorAll('.hud-chip').forEach(c => c.classList.toggle('active', c === chip));

    starEls.forEach(star => {
      const match = activeFilter === 'all' || star.dataset.cat === activeFilter;
      star.style.opacity = match ? '1' : '0.06';
      star.style.pointerEvents = match ? 'auto' : 'none';
      star.style.transition = 'opacity 0.8s ease';
    });

    sparkles.forEach(dot => {
      const match = activeFilter === 'all' || dot.dataset.cat === activeFilter;
      dot.style.opacity = match ? '1' : '0.05';
      dot.style.transition = 'opacity 0.8s ease';
    });

    // Redraw lines with filter awareness
    connections.forEach(c => {
      c._visible = activeFilter === 'all' || c.cat === activeFilter;
    });
  });
});

</script>
