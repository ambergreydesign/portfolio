<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amber Grey — UX Researcher</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #f4f0e8;
  --surface: #ece8e0;
  --text:    #2a2720;
  --muted:   #7d7870;
  --border:  #d6cfc5;
  --ease:    cubic-bezier(.25,.46,.45,.94);
}

body {
  font-family: 'Georgia', 'Times New Roman', serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow: hidden;
}

/* ── PAGES ── */
.page {
  position: fixed;
  inset: 0;
  opacity: 0;
  pointer-events: none;
  transition: opacity 380ms var(--ease);
  overflow-y: auto;
  overflow-x: hidden;
}
.page.active {
  opacity: 1;
  pointer-events: all;
}

/* ══════════════════════════════════
   LEVEL 1 — TERRAIN LANDSCAPE
   ══════════════════════════════════ */
#landscape {
  position: fixed;
  inset: 0;
  overflow: hidden;
}

/* Map title card — top left */
.map-title-card {
  position: absolute;
  top: 44px;
  left: 52px;
  z-index: 20;
  animation: cardIn 1s var(--ease) 0.15s both;
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(-5px); }
  to   { opacity: 1; transform: translateY(0); }
}
.mtc-name {
  font-size: 27px;
  font-weight: normal;
  letter-spacing: 0.03em;
  color: var(--text);
  line-height: 1.1;
}
.mtc-rule {
  width: 44px;
  height: 1px;
  background: var(--border);
  margin: 10px 0;
}
.mtc-tagline {
  font-size: 11px;
  color: var(--muted);
  line-height: 1.75;
  max-width: 195px;
  font-style: italic;
  letter-spacing: 0.01em;
}
.mtc-nav {
  display: flex;
  gap: 18px;
  margin-top: 18px;
}
.mtc-nav a {
  font-size: 10px;
  letter-spacing: 0.13em;
  text-transform: uppercase;
  color: var(--muted);
  text-decoration: none;
  transition: color 150ms;
}
.mtc-nav a:hover { color: var(--text); }

/* Terrain SVG fills the viewport */
.terrain-wrap {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}
.terrain-wrap svg {
  width: 100%;
  height: 100%;
}

/* Territory interactions */
.territory {
  cursor: pointer;
}
.territory .zone-fill {
  transition: filter 220ms ease;
}
.territory:hover .zone-fill {
  filter: brightness(1.06) saturate(1.14);
}
.zone-arrow-hint {
  opacity: 0;
  transition: opacity 180ms ease;
}
.territory:hover .zone-arrow-hint {
  opacity: 1;
}

/* Staggered entrance */
.territory { animation: zoneIn 1s var(--ease) both; }
.territory:nth-of-type(1) { animation-delay: 0.05s; }
.territory:nth-of-type(2) { animation-delay: 0.13s; }
.territory:nth-of-type(3) { animation-delay: 0.21s; }
.territory:nth-of-type(4) { animation-delay: 0.29s; }
.territory:nth-of-type(5) { animation-delay: 0.37s; }
@keyframes zoneIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

/* ══════════════════════════════════
   LEVEL 2 — SECTION VIEW
   ══════════════════════════════════ */
#section-view { min-height: 100vh; background: var(--bg); }

.bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 40px;
}
.bar-logo {
  font-size: 12px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--muted);
}
.back-btn {
  font-family: inherit;
  font-size: 12px;
  letter-spacing: .07em;
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 5px 14px;
  cursor: pointer;
  transition: color 160ms, border-color 160ms;
}
.back-btn:hover { color: var(--text); border-color: var(--text); }

.s2-head {
  padding: 36px 52px 24px;
  max-width: 640px;
}
.s2-eyebrow {
  font-size: 11px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 11px;
}
.s2-title {
  font-size: 30px;
  font-weight: normal;
  margin-bottom: 10px;
}
.s2-desc {
  font-size: 14px;
  color: var(--muted);
  line-height: 1.75;
}

.s2-items {
  padding: 4px 52px 56px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  max-width: 860px;
}

.item-card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 22px 26px;
  cursor: pointer;
  transition: border-color 160ms, transform 160ms, box-shadow 160ms;
}
.item-card:hover {
  border-color: var(--muted);
  transform: translateY(-2px);
  box-shadow: 0 4px 18px rgba(0,0,0,.06);
}
.ic-title { font-size: 15px; margin-bottom: 7px; }
.ic-desc  { font-size: 12px; color: var(--muted); line-height: 1.6; }
.ic-badge {
  display: inline-block;
  margin-top: 13px;
  font-size: 10px;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
  padding-bottom: 2px;
}

/* ══════════════════════════════════
   LEVEL 3 — PANEL
   ══════════════════════════════════ */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(39,36,31,.38);
  opacity: 0;
  pointer-events: none;
  transition: opacity 320ms;
  z-index: 100;
}
.overlay.on { opacity: 1; pointer-events: all; }

.panel {
  position: fixed;
  right: 0; top: 0; bottom: 0;
  width: min(660px, 93vw);
  background: var(--bg);
  z-index: 101;
  transform: translateX(100%);
  transition: transform 400ms var(--ease);
  overflow-y: auto;
  padding: 36px 40px;
}
.panel.on { transform: translateX(0); }

.panel-x {
  font-family: inherit;
  font-size: 22px;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--muted);
  padding: 0;
  margin-bottom: 28px;
  display: block;
  transition: color 150ms;
}
.panel-x:hover { color: var(--text); }

.p-eyebrow {
  font-size: 11px;
  letter-spacing: .11em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 9px;
}
.p-title {
  font-size: 22px;
  font-weight: normal;
  margin-bottom: 11px;
  line-height: 1.3;
}
.p-context {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.8;
  margin-bottom: 24px;
  max-width: 500px;
}
.p-interact {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 22px;
  margin-bottom: 22px;
  min-height: 210px;
}
.transform-block {
  border-top: 1px solid var(--border);
  padding-top: 18px;
  margin-bottom: 22px;
}
.transform-label {
  font-size: 10px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}
.transform-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  font-size: 12px;
  line-height: 1.65;
}
.t-before {
  flex: 1;
  padding: 9px 13px;
  background: var(--surface);
  border-radius: 2px;
  color: var(--muted);
}
.t-arrow { color: var(--muted); font-size: 14px; margin-top: 9px; }
.t-after {
  flex: 1;
  padding: 9px 13px;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 2px;
}
.view-btn {
  font-family: inherit;
  font-size: 12px;
  letter-spacing: .06em;
  background: var(--text);
  color: var(--bg);
  border: none;
  padding: 11px 26px;
  cursor: pointer;
  border-radius: 2px;
  transition: opacity 160ms;
}
.view-btn:hover { opacity: .78; }

/* ── Zoo map ── */
.zoo-toggle { display: flex; margin-bottom: 14px; }
.zoo-toggle button {
  font-family: inherit;
  font-size: 11px;
  letter-spacing: .05em;
  padding: 5px 13px;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  transition: all 140ms;
}
.zoo-toggle button:first-child { border-radius: 2px 0 0 2px; }
.zoo-toggle button:last-child  { border-radius: 0 2px 2px 0; border-left: none; }
.zoo-toggle button.on { background: var(--text); color: var(--bg); border-color: var(--text); }

#zoo-stage { position: relative; height: 158px; }
#zoo-stage svg {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  pointer-events: none;
}
.zn {
  position: absolute;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  text-align: center;
  font-size: 9px; line-height: 1.3;
  cursor: pointer; white-space: pre-line;
  border: 2px solid transparent;
  transition: transform 160ms, border-color 160ms;
}
.zn:hover { transform: scale(1.12); }
.zn.lit   { border-color: var(--text); }

/* ── GPT panel ── */
.gpt-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; height: 100%; min-height: 168px; }
.gpt-col  { display: flex; flex-direction: column; gap: 7px; }
.gpt-lbl  { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
.gpt-transcript {
  flex: 1; background: var(--surface); border-radius: 2px;
  padding: 10px 12px; font-size: 11px; line-height: 1.75;
  color: var(--muted); font-style: italic;
}
.gpt-output-area {
  flex: 1; background: #fff; border: 1px solid var(--border);
  border-radius: 2px; padding: 10px 12px; min-height: 100px; font-size: 11px;
}
.gpt-hint { color: var(--muted); font-style: italic; font-size: 11px; }
.insight-row {
  padding: 5px 0; border-bottom: 1px solid var(--surface);
  color: var(--text); opacity: 0; transform: translateY(5px);
  transition: opacity 260ms, transform 260ms;
  display: flex; gap: 6px; align-items: baseline; font-style: normal;
}
.insight-row.vis { opacity: 1; transform: translateY(0); }
.insight-tag { font-size: 9px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); white-space: nowrap; }
.analyze-btn {
  font-family: inherit; font-size: 11px; letter-spacing: .05em;
  background: var(--text); color: var(--bg); border: none;
  padding: 6px 16px; cursor: pointer; border-radius: 2px;
  align-self: flex-end; transition: opacity 140ms;
}
.analyze-btn:hover     { opacity: .8; }
.analyze-btn:disabled  { opacity: .35; cursor: default; }

/* ── Contradiction mode ── */
.contra-row  { display: flex; justify-content: flex-end; margin-bottom: 12px; }
.contra-switch {
  display: flex; align-items: center; gap: 7px;
  font-size: 11px; cursor: pointer; color: var(--muted); user-select: none;
}
.contra-switch input { display: none; }
.sw-track {
  width: 30px; height: 17px; border-radius: 9px; background: var(--border);
  position: relative; transition: background 200ms;
}
.sw-track::after {
  content: ''; position: absolute; top: 3px; left: 3px;
  width: 11px; height: 11px; border-radius: 50%;
  background: #fff; transition: transform 200ms;
}
.contra-switch.on .sw-track             { background: #7d7870; }
.contra-switch.on .sw-track::after      { transform: translateX(13px); }
.surface-box { padding: 14px; background: var(--surface); border-radius: 3px; }
.surface-box .slbl { font-size: 9px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 7px; }
.surface-box .stxt { font-size: 13px; line-height: 1.65; font-style: italic; }
.tension-layer {
  overflow: hidden; max-height: 0; opacity: 0;
  transition: max-height 420ms var(--ease), opacity 380ms;
  margin-top: 8px;
}
.tension-layer.open { max-height: 260px; opacity: 1; }
.tension-item {
  display: flex; gap: 9px; padding: 9px 13px; margin-bottom: 5px;
  background: #fff; border: 1px solid var(--border);
  border-left: 3px solid #b8a870;
  border-radius: 0 2px 2px 0; font-size: 12px; line-height: 1.6;
}
.ti-lbl { font-size: 9px; text-transform: uppercase; letter-spacing: .08em; color: #b8a870; white-space: nowrap; margin-top: 1px; }
.placeholder-zone {
  display: flex; align-items: center; justify-content: center;
  height: 100%; min-height: 130px;
  color: var(--muted); font-size: 12px; font-style: italic;
  text-align: center; line-height: 1.7;
}

/* ── RESPONSIVE ── */
@media (max-width: 680px) {
  .map-title-card { top: 24px; left: 24px; }
  .mtc-name       { font-size: 21px; }
  .s2-items       { grid-template-columns: 1fr; padding: 4px 24px 48px; }
  .s2-head        { padding: 28px 24px 18px; }
  .panel          { padding: 28px 22px; }
  .gpt-wrap       { grid-template-columns: 1fr; }
}
</style>
</head>

const SECTION_NUMS = {

/* ═══════════════════════════════════
   NAVIGATION
   ═══════════════════════════════════ */
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function openSection(key) {
  const d = DATA[key];
  document.getElementById('s2-eyebrow').textContent =
    `${SECTION_NUMS[key]} / ${key.toUpperCase()}`;
  document.getElementById('s2-title').textContent = d.title;
  document.getElementById('s2-desc').textContent  = d.desc;

  const container = document.getElementById('s2-items');
  container.innerHTML = '';
  d.items.forEach(item => {
    const card = document.createElement('div');
    card.className = 'item-card';
    card.innerHTML = `
      <div class="ic-title">${item.title}</div>
      <div class="ic-desc">${item.desc}</div>
      <span class="ic-badge">${item.badge}</span>`;
    card.addEventListener('click', () => openPanel(key, item.id));
    container.appendChild(card);
  });

  showPage('section-view');
}

function openPanel(sectionKey, itemId) {
  const item    = DATA[sectionKey].items.find(i => i.id === itemId);
  const section = DATA[sectionKey];

  document.getElementById('p-eyebrow').textContent = `${section.title}  /  ${item.badge}`;
  document.getElementById('p-title').textContent   = item.title;
  document.getElementById('p-context').textContent = item.ctx;
  document.getElementById('t-before').textContent  = item.before;
  document.getElementById('t-after').textContent   = item.after;

  const el = document.getElementById('p-interact');
  el.innerHTML = buildInteract(item);

  if (item.interact === 'zoo')           initZoo();
  if (item.interact === 'gpt')           { /* ready */ }
  if (item.interact === 'contradiction') { /* ready */ }

  document.getElementById('overlay').classList.add('on');
  document.getElementById('panel').classList.add('on');
  document.getElementById('panel').scrollTop = 0;
}

function closePanel() {
  document.getElementById('overlay').classList.remove('on');
  document.getElementById('panel').classList.remove('on');
}

/* ═══════════════════════════════════
   INTERACTION BUILDERS
   ═══════════════════════════════════ */
function buildInteract(item) {
  if (item.interact === 'zoo')           return buildZoo();
  if (item.interact === 'gpt')           return buildGPT();
  if (item.interact === 'contradiction') return buildContradiction();
  return `<div class="placeholder-zone">Interactive prototype for<br><em>${item.title}</em><br>would appear here</div>`;
}

/* ── ZOO MAP ── */
const MODES = {
  official: {
    nodes: [
      { id:'mission',  px:.50, py:.12, r:30, bg:'#cfd9d2', lbl:'Conservation\nMission' },
      { id:'edu',      px:.18, py:.58, r:24, bg:'#cfd9d2', lbl:'Education' },
      { id:'research', px:.78, py:.42, r:22, bg:'#cfd9d2', lbl:'Research' },
      { id:'breed',    px:.55, py:.80, r:24, bg:'#cfd9d2', lbl:'Breeding\nPrograms' },
      { id:'visitors', px:.25, py:.22, r:18, bg:'#e3ddd4', lbl:'Visitors' }
    ],
    links:[['visitors','mission'],['mission','edu'],['mission','research'],['mission','breed']]
  },
  money: {
    nodes: [
      { id:'tickets', px:.22, py:.15, r:30, bg:'#e4d9cb', lbl:'Ticket\nRevenue' },
      { id:'food',    px:.74, py:.20, r:26, bg:'#e4d9cb', lbl:'Food &\nMerch' },
      { id:'ops',     px:.48, py:.50, r:28, bg:'#d4d0e6', lbl:'Operations\n& Staff' },
      { id:'cons',    px:.20, py:.82, r:16, bg:'#cfd9d2', lbl:'Conservation\n~3–5%' },
      { id:'capital', px:.76, py:.78, r:20, bg:'#d4d0e6', lbl:'Capital\nProjects' }
    ],
    links:[['tickets','ops'],['food','ops'],['ops','cons'],['ops','capital']]
  }
};

let zMode = 'official';

function buildZoo() {
  return `
    <div class="zoo-toggle">
      <button class="on" data-zmode="official" onclick="zToggle('official')">What Zoos Say</button>
      <button data-zmode="money" onclick="zToggle('money')">Where Money Goes</button>
    </div>
    <div id="zoo-stage"><svg id="zoo-svg"></svg></div>`;
}

function initZoo() { renderZoo('official'); }

function zToggle(mode) {
  zMode = mode;
  document.querySelectorAll('.zoo-toggle button').forEach(b =>
    b.classList.toggle('on', b.dataset.zmode === mode));
  renderZoo(mode);
}

function renderZoo(mode) {
  const stage = document.getElementById('zoo-stage');
  const svg   = document.getElementById('zoo-svg');
  if (!stage || !svg) return;

  const W = stage.offsetWidth  || 320;
  const H = stage.offsetHeight || 158;

  stage.querySelectorAll('.zn').forEach(n => n.remove());
  svg.innerHTML = '';

  const mdata = MODES[mode];

  mdata.links.forEach(([a,b]) => {
    const na = mdata.nodes.find(n => n.id===a);
    const nb = mdata.nodes.find(n => n.id===b);
    const x1 = na.px*W, y1 = na.py*H, x2 = nb.px*W, y2 = nb.py*H;
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',x1); line.setAttribute('y1',y1);
    line.setAttribute('x2',x2); line.setAttribute('y2',y2);
    line.setAttribute('stroke','#c4bcb0');
    line.setAttribute('stroke-width','1.5');
    if (mode==='money') line.setAttribute('stroke-dasharray','4 3');
    svg.appendChild(line);
  });

  mdata.nodes.forEach(node => {
    const el  = document.createElement('div');
    el.className = 'zn';
    const d = node.r * 2;
    el.style.cssText = `width:${d}px;height:${d}px;
      left:${node.px*W - node.r}px;top:${node.py*H - node.r}px;
      background:${node.bg};font-size:${node.r>24?10:9}px;`;
    el.textContent = node.lbl;
    el.addEventListener('click', () => el.classList.toggle('lit'));
    stage.appendChild(el);
  });
}

/* ── GPT PANEL ── */
const INSIGHTS = [
  { tag:'Behavior', text:'Daily active use despite unresolved trust' },
  { tag:'Tension',  text:'Functional satisfaction ≠ psychological safety' },
  { tag:'Signal',   text:'Ambient anxiety about potential failure' },
  { tag:'Social',   text:'External comparison triggered by unresolved doubt' }
];

function buildGPT() {
  return `
    <div class="gpt-wrap">
      <div class="gpt-col">
        <div class="gpt-lbl">Transcript</div>
        <div class="gpt-transcript">"I use the app every day but I don't really… I don't know if I trust it? It does what I want but I always feel like something could go wrong. It's fine, it works, but—"<br><br>"My neighbor uses a different one and says it's more reliable."</div>
      </div>
      <div class="gpt-col">
        <div class="gpt-lbl">Structured Insight</div>
        <div class="gpt-output-area" id="gpt-out"><div class="gpt-hint">Press Analyze to extract insights</div></div>
        <button class="analyze-btn" id="analyze-btn" onclick="runAnalysis()">Analyze →</button>
      </div>
    </div>`;
}

function runAnalysis() {
  const btn = document.getElementById('analyze-btn');
  const out  = document.getElementById('gpt-out');
  if (!btn || !out) return;
  btn.disabled = true;
  out.innerHTML = '';
  INSIGHTS.forEach((ins, i) => {
    const row = document.createElement('div');
    row.className = 'insight-row';
    row.innerHTML = `<span class="insight-tag">${ins.tag}</span>${ins.text}`;
    out.appendChild(row);
    setTimeout(() => row.classList.add('vis'), 180 + i * 200);
  });
}

/* ── CONTRADICTION MODE ── */
function buildContradiction() {
  return `
    <div>
      <div class="contra-row">
        <label class="contra-switch" id="contra-sw" onclick="toggleContra()">
          <input type="checkbox" id="contra-check">
          <span class="sw-track"></span>
          <span>Contradiction Mode</span>
        </label>
      </div>
      <div class="surface-box">
        <div class="slbl">Surface Statement</div>
        <div class="stxt">"Our zoo is committed to conservation. Every visit supports wildlife protection and funds critical research that saves endangered species."</div>
      </div>
      <div class="tension-layer" id="tension-layer">
        <div class="tension-item">
          <div class="ti-lbl">Gap</div>
          <div>~3–5% of zoo revenue is allocated to direct conservation programs.</div>
        </div>
        <div class="tension-item">
          <div class="ti-lbl">Assumption</div>
          <div>Visitors equate ticket purchase with conservation impact.</div>
        </div>
        <div class="tension-item">
          <div class="ti-lbl">Pressure</div>
          <div>Entertainment revenue is structurally required to fund any conservation at all.</div>
        </div>
      </div>
    </div>`;
}

function toggleContra() {
  const sw  = document.getElementById('contra-sw');
  const lay = document.getElementById('tension-layer');
  if (!sw || !lay) return;
  sw.classList.toggle('on');
  lay.classList.toggle('open');
}
