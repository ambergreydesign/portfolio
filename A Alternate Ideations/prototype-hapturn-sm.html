<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HapTurn — Skills & Methods Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:             #060f0e;
  --bg-alt:         #091413;
  --text:           #e0f2f1;
  --text-muted:     #5a9e97;
  --cyan:           #5eead4;
  --teal:           #0d9488;
  --teal-dim:       rgba(13, 148, 136, 0.10);

  --chip-bg:            rgba(13,148,136,0.06);
  --chip-border:        rgba(13,148,136,0.16);
  --chip-color:         rgba(94,234,212,0.65);
  --chip-active-bg:     rgba(13,148,136,0.18);
  --chip-active-border: rgba(13,148,136,0.5);
  --chip-active-color:  rgba(204,251,241,0.95);
  --chip-detail-color:  rgba(94,234,212,0.78);

  --card-bg:            rgba(13,148,136,0.03);
  --card-border:        rgba(13,148,136,0.12);
  --section-eyebrow:    rgba(94,234,212,0.72);
}

html { background: var(--bg); }

body {
  font-family: 'DM Sans', -apple-system, sans-serif;
  color: var(--text);
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
  -webkit-font-smoothing: antialiased;
}

/* ── Outer container ── */
.sm-panel {
  width: 100%;
  max-width: 820px;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 20px;
  overflow: hidden;
  position: relative;
}

/* Subtle radial glow that follows cursor */
.sm-panel::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 20px;
  background: radial-gradient(
    600px circle at var(--mx, 50%) var(--my, 50%),
    rgba(13,148,136,0.06) 0%,
    transparent 60%
  );
  pointer-events: none;
  transition: opacity 0.3s;
  opacity: 0;
}
.sm-panel:hover::before { opacity: 1; }

/* ── Grid layout ── */
.sm-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
}

/* ── Each column ── */
.sm-col {
  padding: 36px 36px 0;
  display: flex;
  flex-direction: column;
}
.sm-col + .sm-col {
  border-left: 1px solid var(--card-border);
}

/* ── Section label ── */
.sm-label {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--section-eyebrow);
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.sm-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, var(--card-border) 0%, transparent 100%);
}

/* ── Chip container ── */
.sm-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

/* ── Individual chip ── */
.sm-chip {
  font-family: inherit;
  font-size: 11.5px;
  font-weight: 400;
  letter-spacing: 0.04em;
  color: var(--chip-color);
  background: var(--chip-bg);
  border: 1px solid var(--chip-border);
  border-radius: 100px;
  padding: 7px 16px;
  cursor: default;
  white-space: nowrap;
  position: relative;
  overflow: hidden;
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

/* Shimmer sweep on hover */
.sm-chip::after {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(
    90deg,
    transparent 0%,
    rgba(94,234,212,0.06) 40%,
    rgba(94,234,212,0.1) 50%,
    rgba(94,234,212,0.06) 60%,
    transparent 100%
  );
  transition: left 0.5s ease;
  pointer-events: none;
}
.sm-chip:hover::after,
.sm-chip.active::after {
  left: 100%;
}

.sm-chip:hover,
.sm-chip.active {
  color: var(--chip-active-color);
  background: var(--chip-active-bg);
  border-color: var(--chip-active-border);
  box-shadow: 0 0 16px rgba(13,148,136,0.12), inset 0 0 12px rgba(13,148,136,0.06);
  transform: translateY(-1px);
}

.sm-chip:focus-visible {
  outline: 2px solid var(--cyan);
  outline-offset: 2px;
  border-radius: 100px;
  color: var(--chip-active-color);
  background: var(--chip-active-bg);
  border-color: var(--chip-active-border);
}

/* ── Per-column detail area ── */
.sm-col-detail {
  margin-top: auto;
  padding: 16px 0 24px;
  min-height: 72px;
  display: flex;
  align-items: flex-start;
}

.sm-col-detail-inner {
  opacity: 0;
  transform: translateY(4px);
  transition: opacity 0.22s ease, transform 0.22s ease;
}
.sm-col-detail-inner.visible {
  opacity: 1;
  transform: translateY(0);
}

.sm-col-detail-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--chip-active-color);
  margin-bottom: 5px;
}

.sm-col-detail-text {
  font-size: 12.5px;
  font-weight: 300;
  letter-spacing: 0.03em;
  line-height: 1.55;
  color: var(--chip-detail-color);
  font-style: italic;
}

/* ── Mobile ── */
@media (max-width: 640px) {
  body { padding: 20px 12px; }
  .sm-grid {
    grid-template-columns: 1fr;
  }
  .sm-col + .sm-col {
    border-left: none;
    border-top: 1px solid var(--card-border);
  }
  .sm-col { padding: 28px 24px 0; }
  .sm-col-detail { padding: 14px 0 20px; }
}

/* ── Reduced motion ── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    transition-duration: 0.01ms !important;
    animation-duration: 0.01ms !important;
  }
}

/* ── High contrast ── */
@media (prefers-contrast: more) {
  .sm-chip {
    border-width: 2px;
    --chip-color: rgba(94,234,212,0.9);
    --chip-border: rgba(13,148,136,0.4);
  }
}
</style>
</head>
<body>

<div class="sm-panel" id="smPanel">
  <div class="sm-grid">
    <!-- Skills -->
    <div class="sm-col" data-group="skills">
      <div class="sm-label">Skills</div>
      <div class="sm-chips">
        <button class="sm-chip" data-detail="Conducting surveys, ethnographic interviews, and card sorts to understand how ADHD and anxiety affect driving.">UX Research</button>
        <button class="sm-chip" data-detail="Designing haptic feedback patterns and CarPlay UI for intuitive, in-motion navigation.">Interaction Design</button>
        <button class="sm-chip" data-detail="Building a working hardware prototype with Arduino, motors, and breadboard circuitry.">Physical Prototyping</button>
        <button class="sm-chip" data-detail="Connecting software logic to physical components — programming vibration patterns in Arduino IDE.">Hardware Integration</button>
        <button class="sm-chip" data-detail="Analyzing survey data to surface correlations between stress levels, ADHD status, and missed exits.">Data Analysis</button>
      </div>
      <div class="sm-col-detail">
        <div class="sm-col-detail-inner">
          <div class="sm-col-detail-label"></div>
          <p class="sm-col-detail-text"></p>
        </div>
      </div>
    </div>

    <!-- Methods -->
    <div class="sm-col" data-group="methods">
      <div class="sm-label">Methods</div>
      <div class="sm-chips">
        <button class="sm-chip" data-detail="Quantitative research mapping ADHD/anxiety status, missed exit frequency, and stress levels.">Surveys</button>
        <button class="sm-chip" data-detail="Five in-depth interviews revealing the emotional and behavioral texture of driving with ADHD.">Ethnographic Interviews</button>
        <button class="sm-chip" data-detail="Prioritizing solutions by feasibility and value — haptic feedback emerged as high-impact, low-effort.">Impact/Effort Matrix</button>
        <button class="sm-chip" data-detail="Manually triggering haptic patterns during simulated drives to evaluate timing and feel.">Wizard of Oz Testing</button>
        <button class="sm-chip" data-detail="Programming motor outputs and button inputs on a Nano microcontroller to simulate real navigation cues.">Arduino / Physical Computing</button>
      </div>
      <div class="sm-col-detail">
        <div class="sm-col-detail-inner">
          <div class="sm-col-detail-label"></div>
          <p class="sm-col-detail-text"></p>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  const panel = document.getElementById('smPanel');
  const cols  = panel.querySelectorAll('.sm-col');

  let activeChip = null;
  let hoverTimer = null;

  // Cursor-following glow
  panel.addEventListener('mousemove', e => {
    const r = panel.getBoundingClientRect();
    panel.style.setProperty('--mx', ((e.clientX - r.left) / r.width * 100).toFixed(1) + '%');
    panel.style.setProperty('--my', ((e.clientY - r.top) / r.height * 100).toFixed(1) + '%');
  });

  function getColDetail(chip) {
    const col = chip.closest('.sm-col');
    return {
      inner: col.querySelector('.sm-col-detail-inner'),
      label: col.querySelector('.sm-col-detail-label'),
      text:  col.querySelector('.sm-col-detail-text')
    };
  }

  function hideAllDetails() {
    cols.forEach(col => {
      col.querySelector('.sm-col-detail-inner').classList.remove('visible');
    });
  }

  function activate(chip) {
    if (activeChip === chip) return;
    if (activeChip) activeChip.classList.remove('active');
    hideAllDetails();

    activeChip = chip;
    chip.classList.add('active');

    const d = getColDetail(chip);
    d.label.textContent = chip.textContent;
    d.text.textContent  = chip.dataset.detail;
    d.inner.classList.add('visible');
  }

  function deactivate() {
    if (activeChip) activeChip.classList.remove('active');
    activeChip = null;
    hideAllDetails();
  }

  panel.querySelectorAll('.sm-chip').forEach(chip => {
    chip.addEventListener('mouseenter', () => {
      clearTimeout(hoverTimer);
      activate(chip);
    });

    chip.addEventListener('mouseleave', () => {
      hoverTimer = setTimeout(deactivate, 180);
    });

    chip.addEventListener('click', e => {
      e.preventDefault();
      if (activeChip === chip) {
        deactivate();
      } else {
        activate(chip);
      }
    });

    chip.addEventListener('focus', () => {
      clearTimeout(hoverTimer);
      activate(chip);
    });
    chip.addEventListener('blur', () => {
      hoverTimer = setTimeout(deactivate, 180);
    });
  });

  // Keep detail alive while hovering the detail area
  cols.forEach(col => {
    const detailArea = col.querySelector('.sm-col-detail');
    detailArea.addEventListener('mouseenter', () => clearTimeout(hoverTimer));
    detailArea.addEventListener('mouseleave', () => {
      hoverTimer = setTimeout(deactivate, 180);
    });
  });
})();
</script>

</body>
</html>
