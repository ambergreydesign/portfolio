<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HapTurn — Skills & Methods Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #060f0e;
  --cyan:     #5eead4;
  --teal:     #0d9488;
  --eyebrow:  rgba(94,234,212,0.72);
}

html {
  background: var(--bg);
  font-family: 'DM Sans', -apple-system, sans-serif;
  color: #e0f2f1;
  -webkit-font-smoothing: antialiased;
}

body {
  background: var(--bg);
  min-height: 100vh;
}

/* ── Stack container ── */
.stack-track {
  position: relative;
  /* 10 cards × 100vh each, plus some breathing room */
  height: calc(10 * 100vh + 100vh);
}

/* ── Sticky viewport ── */
.stack-viewport {
  position: sticky;
  top: 0;
  height: 100vh;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── Card ── */
.stack-card {
  position: absolute;
  width: 90vw;
  max-width: 640px;
  background: rgba(13,148,136,0.03);
  border: 1px solid rgba(13,148,136,0.14);
  border-radius: 20px;
  padding: 48px 44px;
  transition: transform 0.05s linear, opacity 0.05s linear;
  will-change: transform, opacity;
}

/* Type badge */
.card-type {
  font-size: 8px;
  font-weight: 500;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: rgba(94,234,212,0.4);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.card-type-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--teal);
  box-shadow: 0 0 8px rgba(13,148,136,0.4);
}

/* Title */
.card-title {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 32px;
  font-weight: 400;
  color: rgba(204,251,241,0.95);
  margin-bottom: 16px;
  letter-spacing: 0.01em;
  line-height: 1.2;
}

/* Description */
.card-desc {
  font-size: 14px;
  font-weight: 300;
  letter-spacing: 0.03em;
  line-height: 1.65;
  color: rgba(94,234,212,0.7);
  max-width: 480px;
}

/* Index number */
.card-index {
  position: absolute;
  top: 48px; right: 44px;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.08em;
  color: rgba(94,234,212,0.2);
}

/* Collapsed strip state */
.stack-card.collapsed {
  padding: 0 44px;
  height: 52px;
  display: flex;
  align-items: center;
  border-radius: 12px;
}
.stack-card.collapsed .card-type { margin-bottom: 0; margin-right: 12px; }
.stack-card.collapsed .card-title {
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 400;
  letter-spacing: 0.04em;
  color: rgba(94,234,212,0.5);
  margin-bottom: 0;
}
.stack-card.collapsed .card-desc,
.stack-card.collapsed .card-index { display: none; }

/* ── Progress bar ── */
.progress-track {
  position: fixed;
  right: 24px;
  top: 50%;
  transform: translateY(-50%);
  width: 3px;
  height: 200px;
  background: rgba(13,148,136,0.1);
  border-radius: 2px;
  z-index: 50;
}
.progress-fill {
  width: 100%;
  background: var(--teal);
  border-radius: 2px;
  box-shadow: 0 0 8px rgba(13,148,136,0.4);
  transition: height 0.1s linear;
}
.progress-label {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(94,234,212,0.3);
  writing-mode: vertical-rl;
  text-orientation: mixed;
  white-space: nowrap;
}

/* ── Scroll hint ── */
.scroll-hint {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  font-weight: 300;
  letter-spacing: 0.06em;
  color: rgba(94,234,212,0.25);
  pointer-events: none;
  z-index: 50;
  transition: opacity 0.4s;
}
.scroll-hint-arrow {
  display: inline-block;
  animation: bobDown 1.6s ease-in-out infinite;
  margin-left: 6px;
}
@keyframes bobDown {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(4px); }
}

@media (max-width: 640px) {
  .stack-card { padding: 36px 28px; }
  .card-title { font-size: 26px; }
  .card-desc { font-size: 13px; }
  .card-index { top: 36px; right: 28px; }
  .stack-card.collapsed { padding: 0 28px; height: 44px; }
  .progress-track { right: 12px; height: 140px; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    transition-duration: 0.01ms !important;
    animation-duration: 0.01ms !important;
  }
}
</style>
</head>
<body>

<div class="stack-track" id="stackTrack">
  <div class="stack-viewport" id="stackViewport"></div>
</div>

<div class="progress-track">
  <div class="progress-fill" id="progressFill"></div>
  <div class="progress-label">Skills & Methods</div>
</div>

<div class="scroll-hint" id="scrollHint">scroll to explore <span class="scroll-hint-arrow">&darr;</span></div>

<script>
(function () {
  const viewport = document.getElementById('stackViewport');
  const track    = document.getElementById('stackTrack');
  const progFill = document.getElementById('progressFill');
  const hint     = document.getElementById('scrollHint');

  const ITEMS = [
    { label: 'UX Research',          type: 'skill',  detail: 'Conducting surveys, ethnographic interviews, and card sorts to understand how ADHD and anxiety affect driving.' },
    { label: 'Interaction Design',   type: 'skill',  detail: 'Designing haptic feedback patterns and CarPlay UI for intuitive, in-motion navigation.' },
    { label: 'Physical Prototyping', type: 'skill',  detail: 'Building a working hardware prototype with Arduino, motors, and breadboard circuitry.' },
    { label: 'Hardware Integration', type: 'skill',  detail: 'Connecting software logic to physical components — programming vibration patterns in Arduino IDE.' },
    { label: 'Data Analysis',        type: 'skill',  detail: 'Analyzing survey data to surface correlations between stress levels, ADHD status, and missed exits.' },
    { label: 'Surveys',                      type: 'method', detail: 'Quantitative research mapping ADHD/anxiety status, missed exit frequency, and stress levels.' },
    { label: 'Ethnographic Interviews',      type: 'method', detail: 'Five in-depth interviews revealing the emotional and behavioral texture of driving with ADHD.' },
    { label: 'Impact/Effort Matrix',         type: 'method', detail: 'Prioritizing solutions by feasibility and value — haptic feedback emerged as high-impact, low-effort.' },
    { label: 'Wizard of Oz Testing',         type: 'method', detail: 'Manually triggering haptic patterns during simulated drives to evaluate timing and feel.' },
    { label: 'Arduino / Physical Computing', type: 'method', detail: 'Programming motor outputs and button inputs on a Nano microcontroller to simulate real navigation cues.' },
  ];

  const N = ITEMS.length;
  const cards = [];

  // Build cards
  ITEMS.forEach((item, i) => {
    const card = document.createElement('div');
    card.className = 'stack-card';
    card.innerHTML =
      '<div class="card-type"><span class="card-type-dot"></span>' + item.type + '</div>' +
      '<div class="card-title">' + item.label + '</div>' +
      '<p class="card-desc">' + item.detail + '</p>' +
      '<div class="card-index">' + String(i + 1).padStart(2, '0') + ' / ' + String(N).padStart(2, '0') + '</div>';
    viewport.appendChild(card);
    cards.push(card);
  });

  // Each card gets one full viewport height of scroll range
  const CARD_SCROLL = window.innerHeight;

  function onScroll() {
    const scrollY = window.scrollY;
    const maxScroll = track.scrollHeight - window.innerHeight;
    const progress = Math.min(scrollY / maxScroll, 1);

    // Progress bar
    progFill.style.height = (progress * 100) + '%';

    // Hide hint after first scroll
    if (scrollY > 40) hint.style.opacity = '0';

    // Figure out which card is "active" (in focus)
    const activeIndex = Math.min(Math.floor(scrollY / CARD_SCROLL), N - 1);
    const cardProgress = (scrollY - activeIndex * CARD_SCROLL) / CARD_SCROLL;

    cards.forEach((card, i) => {
      card.classList.remove('collapsed');

      if (i < activeIndex) {
        // Already scrolled past — collapsed strip stacked at top
        card.classList.add('collapsed');
        const stackY = 20 + i * 58;
        card.style.transform = 'translateY(calc(-50vh + ' + stackY + 'px + 26px))';
        card.style.opacity = '0.5';
        card.style.zIndex = i;

      } else if (i === activeIndex) {
        // Active card — slides up and fades as you scroll into next
        const moveUp = cardProgress * 80;
        const fade   = cardProgress > 0.7 ? 1 - ((cardProgress - 0.7) / 0.3) : 1;
        card.style.transform = 'translateY(' + (-moveUp) + 'px) scale(' + (1 - cardProgress * 0.03) + ')';
        card.style.opacity = fade;
        card.style.zIndex = N + 1;

      } else if (i === activeIndex + 1) {
        // Next card — rises from below
        const rise = (1 - cardProgress) * 120;
        const fadeIn = cardProgress > 0.3 ? (cardProgress - 0.3) / 0.5 : 0;
        card.style.transform = 'translateY(' + rise + 'px) scale(' + (0.94 + cardProgress * 0.06) + ')';
        card.style.opacity = Math.min(fadeIn, 1);
        card.style.zIndex = N;

      } else {
        // Future cards — hidden below
        card.style.transform = 'translateY(140px) scale(0.92)';
        card.style.opacity = '0';
        card.style.zIndex = 0;
      }
    });
  }

  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll);
  onScroll();
})();
</script>

</body>
</html>
