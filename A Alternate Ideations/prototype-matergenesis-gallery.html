<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MaterGenesis — Image Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,400&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0910;
  --text: #e0d6c8;
  --pink: #eac6ce;
  --amber: #dca25b;
  --muted: rgba(200, 185, 165, 0.5);
  --dim: rgba(200, 185, 165, 0.2);
  --border: rgba(255, 255, 255, 0.06);
  --ecology: #6b8f4a;
  --religion: #7b5ea7;
  --art: #c47a2e;
}

html { background: var(--bg); }
body {
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  overflow-x: hidden;
}

/* ── HEADER ── */
.header {
  text-align: center;
  padding: 48px 32px 24px;
}
.header-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(28px, 4vw, 44px);
  font-weight: 600; color: var(--pink);
  margin-bottom: 8px;
}
.header-sub {
  font-size: 13px; color: var(--muted);
  letter-spacing: 0.03em;
}

/* ── FILTER BAR ── */
.filter-bar {
  display: flex; justify-content: center;
  gap: 8px; padding: 16px 24px 24px;
  position: sticky; top: 0; z-index: 50;
  background: linear-gradient(to bottom, var(--bg) 60%, transparent);
  padding-bottom: 32px;
}
.filter-btn {
  padding: 8px 20px;
  font-family: 'DM Sans', sans-serif;
  font-size: 11px; font-weight: 500;
  letter-spacing: 0.14em; text-transform: uppercase;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 100px;
  color: var(--muted); cursor: pointer;
  transition: all 0.25s ease;
}
.filter-btn:hover { background: rgba(255,255,255,0.07); color: var(--text); }
.filter-btn.active { color: var(--amber); border-color: rgba(220,162,91,0.35); background: rgba(220,162,91,0.08); }
.filter-btn[data-f="ecology"].active { color: var(--ecology); border-color: rgba(107,143,74,0.35); background: rgba(107,143,74,0.08); }
.filter-btn[data-f="religion"].active { color: var(--religion); border-color: rgba(123,94,167,0.35); background: rgba(123,94,167,0.08); }
.filter-btn[data-f="art"].active { color: var(--art); border-color: rgba(196,122,46,0.35); background: rgba(196,122,46,0.08); }

.filter-count {
  font-size: 11px; color: var(--dim);
  text-align: center; margin-top: -16px;
  padding-bottom: 16px;
  letter-spacing: 0.06em;
}

/* ── GRID ── */
.gallery {
  column-count: 4; column-gap: 10px;
  padding: 0 24px 80px;
  max-width: 1200px; margin: 0 auto;
}

.gallery-item {
  break-inside: avoid;
  margin-bottom: 10px;
  border-radius: 8px;
  overflow: hidden;
  position: relative;
  cursor: pointer;
  transition: transform 0.25s ease, box-shadow 0.25s ease;
}
.gallery-item:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 36px rgba(0,0,0,0.5);
}
.gallery-item img {
  width: 100%; display: block;
  transition: transform 0.4s ease;
}
.gallery-item:hover img { transform: scale(1.03); }

.gallery-item .overlay {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 24px 14px 12px;
  background: linear-gradient(to top, rgba(10,9,16,0.92) 0%, transparent 100%);
  opacity: 0; transition: opacity 0.3s ease;
}
.gallery-item:hover .overlay { opacity: 1; }
.overlay-domain {
  font-size: 8px; font-weight: 500;
  letter-spacing: 0.22em; text-transform: uppercase;
  margin-bottom: 4px;
}
.overlay-domain.ecology { color: var(--ecology); }
.overlay-domain.religion { color: var(--religion); }
.overlay-domain.art { color: var(--art); }
.overlay-num {
  font-size: 11px; font-weight: 400;
  color: rgba(200,185,165,0.6); letter-spacing: 0.04em;
}

/* ── LIGHTBOX ── */
.lightbox {
  position: fixed; inset: 0; z-index: 500;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s ease;
}
.lightbox.open { opacity: 1; pointer-events: all; }
.lightbox-backdrop {
  position: absolute; inset: 0;
  background: rgba(6, 5, 10, 0.92);
  backdrop-filter: blur(16px);
  cursor: pointer;
}
.lightbox-inner {
  position: relative; z-index: 1;
  max-width: min(90vw, 900px);
  max-height: 85vh;
  display: flex; flex-direction: column;
  align-items: center;
  transform: scale(0.95) translateY(10px);
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.lightbox.open .lightbox-inner { transform: scale(1) translateY(0); }
.lightbox-img {
  max-width: 100%; max-height: 72vh;
  border-radius: 12px;
  box-shadow: 0 32px 80px rgba(0,0,0,0.6);
  display: block;
}
.lightbox-meta {
  margin-top: 16px; text-align: center;
}
.lightbox-domain {
  font-size: 9px; font-weight: 500;
  letter-spacing: 0.24em; text-transform: uppercase;
  margin-bottom: 6px;
}
.lightbox-label {
  font-size: 14px; color: var(--pink);
  font-family: 'Cormorant Garamond', serif;
  font-weight: 600;
}
.lightbox-close {
  position: absolute; top: -40px; right: 0;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 50%; width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  color: rgba(200,185,165,0.8); font-size: 16px;
  cursor: pointer; font-family: 'DM Sans', sans-serif;
  transition: background 0.2s, color 0.2s;
}
.lightbox-close:hover { background: rgba(255,255,255,0.15); color: #fff; }

.lightbox-nav {
  position: absolute; top: 50%; transform: translateY(-50%);
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 50%; width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  color: rgba(200,185,165,0.7); font-size: 18px;
  cursor: pointer; font-family: 'DM Sans', sans-serif;
  transition: background 0.2s, color 0.2s;
}
.lightbox-nav:hover { background: rgba(255,255,255,0.12); color: #fff; }
.lightbox-prev { left: -60px; }
.lightbox-next { right: -60px; }

/* ── RESPONSIVE ── */
@media (max-width: 900px) { .gallery { column-count: 3; } }
@media (max-width: 600px) {
  .gallery { column-count: 2; padding: 0 12px 60px; }
  .header { padding: 32px 20px 16px; }
  .lightbox-prev { left: 8px; }
  .lightbox-next { right: 8px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-title">Visions of MaterGenesis</div>
  <div class="header-sub">AI-generated imagery across Art, Ecology, and Religion &mdash; MidJourney, 2023</div>
</div>

<div class="filter-bar">
  <button class="filter-btn active" data-f="all" onclick="setFilter('all')">All</button>
  <button class="filter-btn" data-f="art" onclick="setFilter('art')">Art</button>
  <button class="filter-btn" data-f="ecology" onclick="setFilter('ecology')">Ecology</button>
  <button class="filter-btn" data-f="religion" onclick="setFilter('religion')">Religion</button>
</div>
<div class="filter-count" id="filter-count"></div>

<div class="gallery" id="gallery"></div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <div class="lightbox-backdrop" onclick="closeLightbox()"></div>
  <div class="lightbox-inner">
    <button class="lightbox-close" onclick="closeLightbox()">&#10005;</button>
    <button class="lightbox-nav lightbox-prev" onclick="navLightbox(-1)">&#8249;</button>
    <button class="lightbox-nav lightbox-next" onclick="navLightbox(1)">&#8250;</button>
    <img class="lightbox-img" id="lb-img" src="" alt="">
    <div class="lightbox-meta">
      <div class="lightbox-domain" id="lb-domain"></div>
      <div class="lightbox-label" id="lb-label"></div>
    </div>
  </div>
</div>

<script>
'use strict';

const BASE = 'A Images/Matergenesis/MidJourney Images/quad/';

// Build image data from the file system structure
const IMAGES = [];

// ART: 1-16
for (let i = 1; i <= 16; i++) {
  IMAGES.push({ domain: 'art', num: i, file: `ART_${i}.1.webp`, label: `Art ${i}` });
}
// ECO: 1-7 (clean set), plus selected others
for (let i = 1; i <= 7; i++) {
  IMAGES.push({ domain: 'ecology', num: i, file: `ECO_${i}.1.webp`, label: `Ecology ${i}` });
}
[11, 12, 13, 14, 17, 19, 23, 28, 31, 32, 33, 40, 41, 43, 44, 45].forEach(i => {
  IMAGES.push({ domain: 'ecology', num: i, file: `ECO_${i}.1.webp`, label: `Ecology ${i}` });
});
// RELIGION: 1-29
for (let i = 1; i <= 29; i++) {
  IMAGES.push({ domain: 'religion', num: i, file: `RELIGION_${i}.1.webp`, label: `Religion ${i}` });
}

let currentFilter = 'all';
let filteredImages = [...IMAGES];
let lightboxIndex = -1;

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.f === f));
  renderGallery();
}

function renderGallery() {
  filteredImages = currentFilter === 'all' ? [...IMAGES] : IMAGES.filter(img => img.domain === currentFilter);

  document.getElementById('filter-count').textContent = filteredImages.length + ' images';

  const gallery = document.getElementById('gallery');
  gallery.innerHTML = filteredImages.map((img, i) => `
    <div class="gallery-item" onclick="openLightbox(${i})">
      <img src="${BASE}${img.file}" alt="${img.label}" loading="lazy">
      <div class="overlay">
        <div class="overlay-domain ${img.domain}">${img.domain}</div>
        <div class="overlay-num">${img.label}</div>
      </div>
    </div>
  `).join('');
}

function openLightbox(index) {
  lightboxIndex = index;
  const img = filteredImages[index];
  document.getElementById('lb-img').src = BASE + img.file;
  const domainEl = document.getElementById('lb-domain');
  domainEl.textContent = img.domain;
  domainEl.className = 'lightbox-domain ' + img.domain;
  domainEl.style.color = img.domain === 'art' ? '#c47a2e' : img.domain === 'ecology' ? '#6b8f4a' : '#7b5ea7';
  document.getElementById('lb-label').textContent = img.label;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

function navLightbox(dir) {
  let next = lightboxIndex + dir;
  if (next < 0) next = filteredImages.length - 1;
  if (next >= filteredImages.length) next = 0;
  openLightbox(next);
}

document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowRight') navLightbox(1);
  if (e.key === 'ArrowLeft') navLightbox(-1);
});

renderGallery();
</script>

</body>
</html>
